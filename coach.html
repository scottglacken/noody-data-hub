<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Coach — Ecommerce Equation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:#12121e;--ca:#1a1a2a;--bdr:#252540;--acc:#7c3aed;--am:#a78bfa;--t1:#f0f0f5;--t2:#a0a0b8;--t3:#6b6b82;--g:#22c55e;--gb:rgba(34,197,94,.1);--gd:rgba(34,197,94,.25);--y:#eab308;--yb:rgba(234,179,8,.1);--yd:rgba(234,179,8,.25);--r:#ef4444;--rb:rgba(239,68,68,.1);--rd:rgba(239,68,68,.25);--b:#3b82f6;--bb:rgba(59,130,246,.1);--bd:rgba(59,130,246,.25);--p:#a855f7;--pb:rgba(168,85,247,.1);--fn:'JetBrains Mono',monospace;--fs:'DM Sans',system-ui,sans-serif}
body{background:var(--bg);color:var(--t1);font-family:var(--fs);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
button{font-family:var(--fs);cursor:pointer}
.hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);background:linear-gradient(180deg,var(--card),var(--bg));display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--b));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.hdr h1{font-size:17px;font-weight:800;letter-spacing:-.02em}
.hdr p{font-size:11px;color:var(--t3)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-live{color:var(--g);background:var(--gb);border:1px solid var(--gd)}
.badge-off{color:var(--r);background:var(--rb);border:1px solid var(--rd)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.nav{padding:0 20px;border-bottom:1px solid var(--bdr);background:var(--card);position:sticky;top:0;z-index:100;overflow-x:auto;display:flex;gap:2px;max-width:100%}
.nav button{padding:11px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:12px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .2s}
.nav button.on{border-bottom-color:var(--acc);color:var(--am)}
.content{max-width:1100px;margin:0 auto;padding:16px 20px 30px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:22px 20px;margin-bottom:16px}
.card.glow{border-color:#3a2848;box-shadow:0 0 40px rgba(168,85,247,.12)}
.sh{margin-bottom:18px}
.sh h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sh p{font-size:12px;color:var(--t3);margin:2px 0 0 26px;line-height:1.5}
.mg{display:grid;gap:10px}
.mg4{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.mg3{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.mb{border-radius:10px;padding:12px 14px;min-width:0}
.mb-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mb-v{font-size:20px;font-weight:700;font-family:var(--fn)}
.mb-s{font-size:10px;color:var(--t3);margin-top:3px}
.mb-n{background:var(--card);border:1px solid var(--bdr)}
.mb-g{background:var(--gb);border:1px solid var(--gd);color:var(--g)}
.mb-y{background:var(--yb);border:1px solid var(--yd);color:var(--y)}
.mb-r{background:var(--rb);border:1px solid var(--rd);color:var(--r)}
.mb-b{background:var(--bb);border:1px solid var(--bd);color:var(--b)}
.pill{padding:7px 14px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--t3);font-size:12px;font-weight:600;transition:all .2s}
.pill.on{border-color:var(--acc);background:rgba(124,58,237,.08);color:var(--am)}
.tag{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tag-g{color:var(--g);background:var(--gb);border:1px solid var(--gd)}
.tag-y{color:var(--y);background:var(--yb);border:1px solid var(--yd)}
.tag-r{color:var(--r);background:var(--rb);border:1px solid var(--rd)}
.tag-b{color:var(--b);background:var(--bb);border:1px solid var(--bd)}
.tag-p{color:var(--p);background:var(--pb);border:1px solid rgba(168,85,247,.25)}
/* Marvel Math colors */
.marvel-superhero{border-left:3px solid #fbbf24;background:rgba(251,191,36,.06)}
.marvel-hero{border-left:3px solid var(--g);background:var(--gb)}
.marvel-sidekick{border-left:3px solid var(--b);background:var(--bb)}
.marvel-civilian{border-left:3px solid var(--t3);background:rgba(107,114,128,.06)}
.marvel-villain{border-left:3px solid var(--r);background:var(--rb)}
.marvel-unknown{border-left:3px solid var(--bdr);background:var(--ca)}
.action-box{padding:12px 14px;border-radius:10px;display:flex;gap:12px;align-items:flex-start;font-size:13px;line-height:1.6}
.action-high{background:var(--rb);border:1px solid var(--rd)}
.action-scale{background:var(--gb);border:1px solid var(--gd)}
.action-med{background:var(--yb);border:1px solid var(--yd)}
.action-info{background:var(--bb);border:1px solid var(--bd)}
.setup{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.setup label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.setup input,.setup select{width:100%;padding:10px 14px;background:var(--ca);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:14px;font-family:var(--fn);outline:none;box-sizing:border-box}
.ad-row{padding:14px 16px;border-radius:12px;margin-bottom:8px;animation:fadeIn .3s ease both}
.ad-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.ad-row-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.ad-row-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:8px}
.ad-row-metrics span{font-size:10px;color:var(--t3)}
.ad-row-metrics div{font-size:14px;font-weight:600;font-family:var(--fn)}
.verdict-box{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.6}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.loading h2{font-size:20px;font-weight:700;margin-bottom:8px}
.loading p{font-size:13px;color:var(--t2);line-height:1.6}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;margin:24px auto 0;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;
const API_KEY="noody-eq-2026-datahub";

/* ── BENCHMARKS (from EE framework) ─────────── */
const CAMPAIGN_FREQ={
  tof:{good:2.0,warn:2.5,crit:3.0},
  tom:{good:3.5,warn:4.0,crit:4.5},
  mof:{good:4.0,warn:5.0,crit:6.0},
  bof:{good:6.0,warn:7.0,crit:8.0},
};
const AD_FREQ={
  tof:{good:1.4,okay:1.8,bad:2.0},
  tom:{good:1.8,okay:2.0,bad:2.5},
  mof:{good:2.0,okay:2.4,bad:3.0},
  bof:{good:2.4,okay:3.0,bad:4.0},
};
const FUNNEL_SPLIT={TOF:.45,ASC:.35,MOF:.20};
const SPEND_BRACKETS=[
  {max:500,label:"< $500/d",tof:1,asc:1,mof:1},
  {max:1000,label:"$500–$1k/d",tof:2,asc:2,mof:1},
  {max:3000,label:"$1k–$3k/d",tof:3,asc:2,mof:1},
  {max:Infinity,label:"> $3k/d",tof:4,asc:3,mof:2},
];

/* ── UTILS ──────────────────────────────────── */
const f$=(n)=>n==null?"—":"$"+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const f$r=(n)=>n==null?"—":"$"+Math.round(n).toLocaleString();
const fx=(n)=>n==null?"—":n.toFixed(2)+"x";
const fp=(n)=>n==null?"—":n.toFixed(1)+"%";

function detectStage(name){
  const n=(name||"").toLowerCase();
  if(n.includes("tom")||n.includes("top of mid"))return"tom";
  if(n.includes("mof")||n.includes("middle")||n.includes("retarget")||n.includes("remark")||n.includes("bot"))return"mof";
  if(n.includes("bof")||n.includes("bottom"))return"bof";
  if(n.includes("asc")||n.includes("advantage")||n.includes("shopping"))return"asc";
  return"tof";
}

const MARVEL={
  superhero:{label:"Superhero",icon:"🦸",color:"#fbbf24",cls:"marvel-superhero",action:"SCALE 20%+ — This is your best performer. Duplicate and increase budget aggressively."},
  hero:{label:"Hero",icon:"🌟",color:"#22c55e",cls:"marvel-hero",action:"SCALE 10-20% — Strong ad. Increase budget incrementally and test similar angles."},
  sidekick:{label:"Sidekick",icon:"🤝",color:"#3b82f6",cls:"marvel-sidekick",action:"MONITOR — Supporting the team but not a star. Keep running, test new hooks."},
  civilian:{label:"Civilian",icon:"👤",color:"#6b7280",cls:"marvel-civilian",action:"WATCH — Not contributing much. Give it 48h more or prepare replacement."},
  villain:{label:"Villain",icon:"🦹",color:"#ef4444",cls:"marvel-villain",action:"KILL IMMEDIATELY — Wasting budget. Turn off now and replace with new creative."},
  unknown:{label:"Unknown",icon:"❓",color:"#6b7280",cls:"marvel-unknown",action:"INSUFFICIENT DATA — Not enough spend or conversions to classify. Wait for more data."},
};

/* ── CPP THRESHOLDS (AOV × MER based) ──────── */
function calcThresholds(aov,mer){
  const base=aov*(mer/100);
  return{
    tof:{good:base*2,bad:base*4},
    tom:{good:base*1.25,bad:base*2.5},
    mof:{good:base,bad:base*2},
    bof:{good:base*0.75,bad:base*1.5},
    asc:{good:base*1.5,bad:base*3}, // ASC between TOF and MOF
  };
}

/* ── MARVEL MATH CLASSIFIER ─────────────────── */
function classifyAd(ad,thresholds){
  const stage=detectStage(ad.campaign_name);
  const cppT=thresholds[stage]||thresholds.tof;
  const freqT=AD_FREQ[stage==="asc"?"tof":stage]||AD_FREQ.tof;

  let cppS;
  if(ad.cpp===0&&ad.purchases===0)cppS="unknown";
  else if(ad.cpp===0&&ad.purchases>0)cppS="good";
  else if(ad.cpp<=cppT.good)cppS="good";
  else if(ad.cpp<cppT.bad)cppS="okay";
  else cppS="bad";

  let freqS;
  if(!ad.frequency||ad.frequency===0)freqS="unknown";
  else if(ad.frequency<=freqT.good)freqS="good";
  else if(ad.frequency<(freqT.okay||freqT.bad))freqS="okay";
  else freqS="bad";

  const isHighReach=ad.reach>5000;
  const minSpend=cppT.good; // need at least 1x good CPP in spend

  let classification;
  if(ad.spend<minSpend){
    classification="unknown";
  }else if(cppS==="unknown"||freqS==="unknown"){
    classification="unknown";
  }else if(cppS==="good"&&freqS==="good"){
    classification=isHighReach?"superhero":"hero";
  }else if((cppS==="good"&&freqS==="okay")||(cppS==="okay"&&freqS==="good")){
    classification=isHighReach?"hero":"sidekick";
  }else if((cppS==="okay"&&freqS==="okay")||(cppS==="good"&&freqS==="bad")){
    classification=isHighReach?"sidekick":"civilian";
  }else{
    classification="villain";
  }

  return{...ad,stage,classification,cppStatus:cppS,freqStatus:freqS,isHighReach};
}

/* ── CAMPAIGN HEALTH ASSESSMENT ────────────── */
function assessCampaign(c){
  const stage=detectStage(c.campaign_name);
  const bench=CAMPAIGN_FREQ[stage==="asc"?"tof":stage]||CAMPAIGN_FREQ.tof;
  let status,text;
  if(!c.frequency||c.frequency===0){status="unknown";text="No frequency data";}
  else if(c.frequency<=bench.good){status="healthy";text="✅ Healthy — safe to scale winners";}
  else if(c.frequency<=(bench.warn||bench.good*1.25)){status="warning";text="⚠️ Watch — frequency rising, prepare refresh";}
  else{status="critical";text="🚨 Critical — do NOT scale, refresh creative";}
  return{...c,stage,healthStatus:status,healthText:text,benchmark:bench.good};
}

/* ── COMPONENTS ─────────────────────────────── */
function App(){
  const[tab,setTab]=useState("overview");
  const[loading,setLoading]=useState(true);
  const[status,setStatus]=useState("Connecting...");
  const[campaigns,setCampaigns]=useState([]);
  const[ads,setAds]=useState([]);
  const[summary,setSummary]=useState(null);
  const[apiOk,setApiOk]=useState(null);
  const[days,setDays]=useState(14);
  const[aov,setAov]=useState(78);
  const[mer,setMer]=useState(20);

  const thresholds=useMemo(()=>calcThresholds(aov,mer),[aov,mer]);

  const fetchAll=useCallback(async(d)=>{
    setLoading(true);
    try{
      setStatus("Pulling campaign data...");
      const cr=await fetch("/api/pull-meta?days="+d+"&level=campaign",{headers:{"x-api-key":API_KEY}});
      if(!cr.ok)throw new Error("Campaign fetch: HTTP "+cr.status);
      const cd=await cr.json();
      setCampaigns(cd.data||cd.campaigns||[]);
      setSummary(cd.summary||null);

      setStatus("Pulling ad-level data for Marvel Math...");
      try{
        const ar=await fetch("/api/pull-meta?days="+d+"&level=ad",{headers:{"x-api-key":API_KEY}});
        if(ar.ok){const ad=await ar.json();setAds(ad.data||[]);}
      }catch(e){console.log("Ad-level not available:",e);}

      setApiOk({ok:true,msg:(cd.data||cd.campaigns||[]).length+" campaigns"});
    }catch(e){
      setApiOk({ok:false,msg:e.message});
    }
    setLoading(false);
  },[]);

  useEffect(()=>{fetchAll(days);},[]);

  // Processed data
  const assessedCampaigns=useMemo(()=>campaigns.map(assessCampaign),[campaigns]);
  const classifiedAds=useMemo(()=>ads.map(a=>classifyAd(a,thresholds)),[ads,thresholds]);

  const marvelCounts=useMemo(()=>{
    const c={superhero:0,hero:0,sidekick:0,civilian:0,villain:0,unknown:0};
    classifiedAds.forEach(a=>{c[a.classification]=(c[a.classification]||0)+1;});
    return c;
  },[classifiedAds]);

  const totalSpend=summary?.totalSpend||campaigns.reduce((s,c)=>s+(parseFloat(c.spend)||0),0);
  const totalPurchases=summary?.totalPurchases||campaigns.reduce((s,c)=>s+(parseInt(c.purchases)||0),0);
  const totalRevenue=summary?.totalPurchaseValue||campaigns.reduce((s,c)=>s+(parseFloat(c.purchase_value)||0),0);
  const blendedCPA=totalPurchases>0?totalSpend/totalPurchases:0;
  const blendedROAS=totalSpend>0?totalRevenue/totalSpend:0;
  const dailySpend=totalSpend/(days||14);
  const estRevFromAOV=totalPurchases*aov;
  const profit=estRevFromAOV-totalSpend;

  // Priority actions
  const villains=classifiedAds.filter(a=>a.classification==="villain");
  const heroes=classifiedAds.filter(a=>a.classification==="hero"||a.classification==="superhero");
  const villainWaste=villains.reduce((s,a)=>s+a.spend,0);
  const critCampaigns=assessedCampaigns.filter(c=>c.healthStatus==="critical");

  const actions=[];
  if(villains.length)actions.push({p:"high",text:"🛑 Turn off "+villains.length+" Villain ad"+(villains.length>1?"s":"")+" — wasting "+f$r(villainWaste)});
  if(heroes.length)actions.push({p:"scale",text:"🚀 Scale "+heroes.length+" Hero/Superhero ad"+(heroes.length>1?"s":"")+" by 10-20%"});
  if(critCampaigns.length)actions.push({p:"high",text:"🚨 "+critCampaigns.length+" campaign"+(critCampaigns.length>1?"s":"")+" at critical frequency — do NOT scale, refresh creative"});
  if(!actions.length&&campaigns.length)actions.push({p:"info",text:"💡 Account looks stable. Keep monitoring and testing new creative."});

  if(loading&&!campaigns.length)return <div className="loading">
    <div style={{width:64,height:64,borderRadius:16,margin:"0 auto 24px",background:"linear-gradient(135deg,var(--acc),var(--b))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🧠</div>
    <h2>Coach is analysing your account...</h2>
    <p>{status}</p>
    <div className="spinner"/>
  </div>;

  const tabs=[
    {id:"overview",label:"Account Overview",icon:"📊"},
    {id:"campaigns",label:"Campaigns",icon:"📁"},
    {id:"marvel",label:"Marvel Math",icon:"🦸"},
    {id:"actions",label:"Actions",icon:"⚡"},
    {id:"structure",label:"Structure Calc",icon:"🧮"},
    {id:"settings",label:"Settings",icon:"⚙️"},
  ];

  return <div>
    {/* Header */}
    <div className="hdr">
      <div className="hdr-l">
        <div className="hdr-logo">EE</div>
        <div><h1>Meta Ads Coach</h1><p>Ecommerce Equation • Marvel Math • Live API</p></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {apiOk&&<span className={"badge "+(apiOk.ok?"badge-live":"badge-off")}><span className="dot" style={{background:apiOk.ok?"var(--g)":"var(--r)"}}/>{apiOk.ok?"LIVE":"OFFLINE"}</span>}
        <a href="/" style={{fontSize:11,color:"var(--t3)",textDecoration:"none",padding:"4px 10px",border:"1px solid var(--bdr)",borderRadius:6}}>← Dashboard</a>
      </div>
    </div>

    {/* Nav */}
    <div className="nav">
      {tabs.map(t=><button key={t.id} className={tab===t.id?"on":""} onClick={()=>setTab(t.id)}><span>{t.icon}</span> {t.label}</button>)}
    </div>

    {/* Range + Refresh */}
    <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 20px 0",display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:"var(--t3)",marginRight:6}}>Range:</span>
      {[7,14,30].map(d=><button key={d} className={"pill"+(days===d?" on":"")} onClick={()=>{setDays(d);fetchAll(d);}}>{d}d</button>)}
      <button onClick={()=>fetchAll(days)} disabled={loading} style={{marginLeft:8,padding:"6px 14px",background:"transparent",border:"1px solid var(--bdr)",borderRadius:7,color:"var(--t2)",fontSize:11,fontWeight:600}}>🔄 Refresh</button>
      <span style={{marginLeft:"auto",fontSize:11,color:"var(--t3)"}}>{campaigns.length} campaigns • {ads.length} ads</span>
    </div>

    <div className="content">
      {/* ── OVERVIEW TAB ─────────────────────── */}
      {tab==="overview"&&<div>
        <div className="card glow">
          <div className="sh"><h2>📊 Account Overview — Last {days} Days</h2></div>
          <div className="mg mg4" style={{marginBottom:16}}>
            <div className="mb mb-n"><div className="mb-l">Total Spend</div><div className="mb-v" style={{color:"var(--t1)"}}>{f$r(totalSpend)}</div><div className="mb-s">{f$r(dailySpend)}/day</div></div>
            <div className={"mb "+(blendedROAS>=3?"mb-g":blendedROAS>=2?"mb-y":"mb-r")}><div className="mb-l">ROAS</div><div className="mb-v">{fx(blendedROAS)}</div><div className="mb-s">{blendedROAS>=3?"Excellent":blendedROAS>=2?"Good":"Needs work"}</div></div>
            <div className="mb mb-n"><div className="mb-l">Purchases</div><div className="mb-v" style={{color:"var(--t1)"}}>{totalPurchases}</div><div className="mb-s">AOV ~{f$r(aov)}</div></div>
            <div className={"mb "+(blendedCPA<=aov*mer/100*2?"mb-g":blendedCPA<=aov*mer/100*4?"mb-y":"mb-r")}><div className="mb-l">Blended CPP</div><div className="mb-v">{f$(blendedCPA)}</div><div className="mb-s">Target: {"<"+f$r(aov*mer/100*2)}</div></div>
            <div className={"mb "+(profit>=0?"mb-g":"mb-r")}><div className="mb-l">Est. Profit</div><div className="mb-v">{f$r(Math.abs(profit))}</div><div className="mb-s">{profit>=0?"Profitable ✅":"Loss 🔴"}</div></div>
          </div>

          {/* Marvel Math Summary */}
          {ads.length>0&&<div>
            <div style={{fontSize:12,color:"var(--t3)",marginBottom:8,fontWeight:600}}>MARVEL MATH BREAKDOWN</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {Object.entries(MARVEL).filter(([k])=>k!=="unknown").map(([k,v])=><div key={k} style={{flex:1,minWidth:90,padding:"10px 12px",borderRadius:10,background:v.color+"15",border:"1px solid "+v.color+"33",textAlign:"center"}}>
                <div style={{fontSize:20}}>{v.icon}</div>
                <div style={{fontSize:20,fontWeight:800,fontFamily:"var(--fn)",color:v.color}}>{marvelCounts[k]||0}</div>
                <div style={{fontSize:10,color:"var(--t2)"}}>{v.label}s</div>
              </div>)}
            </div>
          </div>}
        </div>

        {/* Priority Actions */}
        {actions.length>0&&<div className="card">
          <div className="sh"><h2>⚡ Priority Actions</h2><p>What to do right now</p></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {actions.map((a,i)=><div key={i} className={"action-box "+(a.p==="high"?"action-high":a.p==="scale"?"action-scale":a.p==="med"?"action-med":"action-info")}>{a.text}</div>)}
          </div>
        </div>}
      </div>}

      {/* ── CAMPAIGNS TAB ────────────────────── */}
      {tab==="campaigns"&&<div className="card">
        <div className="sh"><h2>📁 Campaign Health Assessment</h2><p>Frequency-based health check per funnel stage</p></div>
        {assessedCampaigns.map((c,i)=>{
          const sc=c.healthStatus==="healthy"?"var(--g)":c.healthStatus==="warning"?"var(--y)":"var(--r)";
          return <div key={i} className="ad-row" style={{borderLeft:"3px solid "+sc,background:sc+"0d",animationDelay:i*0.05+"s"}}>
            <div className="ad-row-head">
              <span className="ad-row-name">{c.campaign_name}</span>
              <div style={{display:"flex",gap:6}}>
                <span className={"tag tag-"+(c.stage==="tof"||c.stage==="asc"?"b":c.stage==="mof"?"p":"g")}>{c.stage.toUpperCase()}</span>
                <span className={"tag tag-"+(c.healthStatus==="healthy"?"g":c.healthStatus==="warning"?"y":"r")}>{c.healthStatus}</span>
              </div>
            </div>
            <div className="ad-row-metrics">
              <div><span>SPEND</span><div>{f$(c.spend)}</div></div>
              <div><span>CPP</span><div>{c.cpp?f$(c.cpp):"—"}</div></div>
              <div><span>PURCHASES</span><div>{c.purchases||0}</div></div>
              <div><span>ROAS</span><div style={{color:c.roas>=3?"var(--g)":c.roas>=2?"var(--y)":c.roas>0?"var(--r)":"inherit"}}>{fx(c.roas)}</div></div>
              <div><span>FREQUENCY</span><div style={{color:sc}}>{c.frequency?c.frequency.toFixed(2):"—"}</div></div>
              <div><span>BENCHMARK</span><div style={{color:"var(--t3)"}}>≤{c.benchmark?.toFixed(1)}</div></div>
            </div>
            <div className="verdict-box" style={{background:sc+"0d"}}><strong style={{color:sc}}>{c.healthText}</strong></div>
          </div>;
        })}
      </div>}

      {/* ── MARVEL MATH TAB ──────────────────── */}
      {tab==="marvel"&&<div>
        {ads.length===0?<div className="card">
          <div className="sh"><h2>🦸 Marvel Math Classification</h2></div>
          <p style={{color:"var(--t2)",lineHeight:1.6}}>Ad-level data not available. Your API needs to support <code style={{color:"var(--am)"}}>?level=ad</code> to enable Marvel Math classification. Check that your pull-meta.js is updated.</p>
        </div>:
        <div className="card">
          <div className="sh"><h2>🦸 Marvel Math — Ad Classification</h2><p>Every ad classified using CPP thresholds (AOV ${f$r(aov)} × MER {mer}%) + frequency by funnel stage</p></div>
          <div style={{fontSize:11,color:"var(--t3)",padding:"8px 12px",background:"var(--ca)",borderRadius:8,marginBottom:16}}>
            CPP Thresholds → TOF: green ≤{f$r(thresholds.tof.good)} / red ≥{f$r(thresholds.tof.bad)} &nbsp;|&nbsp; MOF: green ≤{f$r(thresholds.mof.good)} / red ≥{f$r(thresholds.mof.bad)}
          </div>
          {classifiedAds.sort((a,b)=>{
            const order={superhero:0,hero:1,sidekick:2,civilian:3,villain:4,unknown:5};
            return(order[a.classification]||5)-(order[b.classification]||5)||b.spend-a.spend;
          }).map((a,i)=>{
            const m=MARVEL[a.classification]||MARVEL.unknown;
            return <div key={i} className={"ad-row "+m.cls} style={{animationDelay:i*0.03+"s"}}>
              <div className="ad-row-head">
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{m.icon}</span>
                  <span className="ad-row-name">{a.ad_name||a.campaign_name}</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <span style={{padding:"3px 10px",borderRadius:99,fontSize:10,fontWeight:700,color:m.color,background:m.color+"15",border:"1px solid "+m.color+"33"}}>{m.label}</span>
                  <span className={"tag tag-"+(a.stage==="tof"||a.stage==="asc"?"b":a.stage==="mof"?"p":"g")}>{a.stage.toUpperCase()}</span>
                </div>
              </div>
              <div className="ad-row-metrics">
                <div><span>SPEND</span><div>{f$(a.spend)}</div></div>
                <div><span>CPP</span><div style={{color:a.cppStatus==="good"?"var(--g)":a.cppStatus==="okay"?"var(--y)":a.cppStatus==="bad"?"var(--r)":"inherit"}}>{a.cpp?f$(a.cpp):"—"}</div></div>
                <div><span>PURCHASES</span><div>{a.purchases||0}</div></div>
                <div><span>FREQ</span><div style={{color:a.freqStatus==="good"?"var(--g)":a.freqStatus==="okay"?"var(--y)":a.freqStatus==="bad"?"var(--r)":"inherit"}}>{a.frequency?a.frequency.toFixed(2):"—"}</div></div>
                <div><span>REACH</span><div>{(a.reach||0).toLocaleString()}{a.isHighReach?" 🔥":""}</div></div>
                <div><span>ROAS</span><div>{fx(a.roas)}</div></div>
              </div>
              <div className="verdict-box" style={{background:m.color+"0d"}}><strong style={{color:m.color}}>Action:</strong> {m.action}</div>
            </div>;
          })}
        </div>}
      </div>}

      {/* ── ACTIONS TAB ──────────────────────── */}
      {tab==="actions"&&<div>
        {villains.length>0&&<div className="card">
          <div className="sh"><h2>🛑 Step 1: Kill Villains</h2><p>Turn these off immediately — wasting {f$r(villainWaste)}</p></div>
          {villains.map((a,i)=><div key={i} className="ad-row marvel-villain" style={{animationDelay:i*0.05+"s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <span style={{fontWeight:700,fontSize:13}}>🦹 {a.ad_name||a.campaign_name}</span>
              <span style={{fontFamily:"var(--fn)",fontSize:13,color:"var(--r)"}}>{f$(a.spend)} wasted • CPP {a.cpp?f$(a.cpp):"∞"} • Freq {a.frequency?.toFixed(2)||"—"}</span>
            </div>
          </div>)}
        </div>}

        {heroes.length>0&&<div className="card">
          <div className="sh"><h2>🚀 Step 2: Scale Heroes</h2><p>Increase budget 10-20% on these winners</p></div>
          {heroes.map((a,i)=><div key={i} className={"ad-row "+(a.classification==="superhero"?"marvel-superhero":"marvel-hero")} style={{animationDelay:i*0.05+"s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <span style={{fontWeight:700,fontSize:13}}>{a.classification==="superhero"?"🦸":"🌟"} {a.ad_name||a.campaign_name}</span>
              <span style={{fontFamily:"var(--fn)",fontSize:13,color:"var(--g)"}}>CPP {f$(a.cpp)} • ROAS {fx(a.roas)} • Freq {a.frequency?.toFixed(2)}</span>
            </div>
          </div>)}
        </div>}

        {!villains.length&&!heroes.length&&<div className="card">
          <div className="sh"><h2>⚡ Actions</h2></div>
          <p style={{color:"var(--t2)"}}>No immediate actions. {ads.length===0?"Connect ad-level data for Marvel Math classification.":"Account is stable — keep testing new creative."}</p>
        </div>}
      </div>}

      {/* ── STRUCTURE CALC ───────────────────── */}
      {tab==="structure"&&<div className="card">
        <div className="sh"><h2>🧮 Campaign Structure Calculator</h2><p>How many campaigns to run based on daily spend</p></div>
        {(()=>{
          const bracket=SPEND_BRACKETS.find(b=>dailySpend<b.max)||SPEND_BRACKETS[3];
          const total=bracket.tof+bracket.asc+bracket.mof;
          return <div>
            <div style={{padding:"16px",background:"var(--ca)",borderRadius:10,marginBottom:16}}>
              <div style={{fontSize:12,color:"var(--t3)",marginBottom:4}}>Your daily spend: <strong style={{color:"var(--t1)",fontFamily:"var(--fn)"}}>{f$r(dailySpend)}</strong> → <strong style={{color:"var(--am)"}}>{bracket.label}</strong> bracket</div>
            </div>
            {[["TOF","#3b82f6",bracket.tof,45],["ASC","#a855f7",bracket.asc,35],["MOF","#22c55e",bracket.mof,20]].map(([label,color,count,pct])=>
              <div key={label} style={{display:"grid",gridTemplateColumns:"70px 1fr 60px",gap:12,alignItems:"center",padding:"12px 14px",borderRadius:10,borderLeft:"3px solid "+color,background:color+"0d",marginBottom:8}}>
                <span style={{fontWeight:700,color,fontFamily:"var(--fn)",fontSize:14}}>{label}</span>
                <div style={{height:8,borderRadius:4,background:color+"20",overflow:"hidden"}}><div style={{height:"100%",width:pct*2+"%",background:color,borderRadius:4}}/></div>
                <span style={{fontFamily:"var(--fn)",fontSize:18,fontWeight:700,textAlign:"center"}}>{count}</span>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:"var(--ca)",borderRadius:10,marginTop:8}}>
              <span style={{fontSize:13,color:"var(--t2)"}}>Total Campaigns</span>
              <span style={{fontSize:32,fontWeight:800,fontFamily:"var(--fn)"}}>{total}</span>
            </div>
            {campaigns.length>0&&<div style={{marginTop:12,padding:"12px 14px",borderRadius:10,background:campaigns.length<=total+2?"var(--gb)":"var(--yb)",border:"1px solid "+(campaigns.length<=total+2?"var(--gd)":"var(--yd)")}}>
              <span style={{fontSize:12}}>{campaigns.length<=total+2?"✅":"⚠️"} You have {campaigns.length} campaigns. Framework recommends ~{total} for {bracket.label}.</span>
            </div>}
          </div>;
        })()}
      </div>}

      {/* ── SETTINGS ─────────────────────────── */}
      {tab==="settings"&&<div className="card">
        <div className="sh"><h2>⚙️ Settings</h2><p>Configure AOV and MER to set CPP thresholds</p></div>
        <div className="setup">
          <div><label>AOV ($)</label><input type="number" value={aov} onChange={e=>setAov(parseFloat(e.target.value)||78)}/></div>
          <div><label>Target MER (%)</label><input type="number" value={mer} onChange={e=>setMer(parseFloat(e.target.value)||20)}/></div>
        </div>
        <div style={{padding:14,background:"var(--ca)",borderRadius:10,fontSize:12,color:"var(--t3)",lineHeight:1.8}}>
          <strong style={{color:"var(--t2)"}}>CPP Thresholds (AOV × MER = {f$r(aov*mer/100)} base):</strong><br/>
          TOF: 🟢 ≤{f$r(thresholds.tof.good)} 🔴 ≥{f$r(thresholds.tof.bad)}<br/>
          TOM: 🟢 ≤{f$r(thresholds.tom.good)} 🔴 ≥{f$r(thresholds.tom.bad)}<br/>
          MOF: 🟢 ≤{f$r(thresholds.mof.good)} 🔴 ≥{f$r(thresholds.mof.bad)}<br/>
          BOF: 🟢 ≤{f$r(thresholds.bof.good)} 🔴 ≥{f$r(thresholds.bof.bad)}
        </div>
        <div style={{marginTop:16,padding:14,background:"var(--ca)",borderRadius:10,fontSize:11,color:"var(--t3)",fontFamily:"var(--fn)",lineHeight:1.6}}>
          <strong style={{color:"var(--t2)"}}>API:</strong> /api/pull-meta?level=campaign|ad&days={days}<br/>
          <strong style={{color:"var(--t2)"}}>Auth:</strong> x-api-key header
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
