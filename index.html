  :root{--bg:#f8f9fb;--card:#ffffff;--bdr:#d1d5db;--t1:#111827;--t2:#374151;--t3:#6b7280;--acc:#3b5bdb;--grn:#15803d;--ylw:#92400e;--red:#b91c1c;--grid:#e5e7eb;--tipbg:#ffffff;--tipbdr:#d1d5db}

  .tab-bar{display:flex;gap:2px;flex-wrap:wrap;align-items:center}

  .pulse-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;border:1px solid transparent;white-space:nowrap}

  .pulse-pill[data-s="w"]{background:rgba(146,64,14,0.08);border-color:rgba(146,64,14,0.3);color:#92400e}
  .pulse-pill[data-s="c"]{background:rgba(185,28,28,0.08);border-color:rgba(185,28,28,0.3);color:#b91c1c}
  .pulse-pill[data-s="n"]{background:rgba(107,114,128,0.06);border-color:rgba(107,114,128,0.2);color:#6b7280}
  @media(max-width:768px){.pulse-bar{flex-wrap:wrap}.pulse-pill{font-size:11px;padding:4px 10px}

const AUTH_HASH="a79f6ebca16b6b22e3fa7f1677375e9a735dae50774a88955182ce5ab8f71924";
const AUTH_KEY="noody_auth";
async function hashPw(pw){const enc=new TextEncoder().encode(pw);const buf=await crypto.subtle.digest("SHA-256",enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}
function LoginScreen({onAuth}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const [checking,setChecking]=useState(false);
  const handleSubmit=async(e)=>{
    e.preventDefault();setChecking(true);setErr(false);
    const h=await hashPw(pw);
    if(h===AUTH_HASH){sessionStorage.setItem(AUTH_KEY,"1");onAuth();}
    else{setErr(true);setChecking(false);}
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:16,padding:40,width:360,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:32,marginBottom:8}}>&#x1F510;</div>
      <h1 style={{fontSize:20,fontWeight:700,color:"var(--t1)",marginBottom:4}}>Noody Command Center</h1>
      <p style={{fontSize:13,color:"var(--t3)",marginBottom:24}}>Enter password to access the dashboard</p>
      <form onSubmit={handleSubmit}>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" autoFocus
          style={{width:"100%",padding:"12px 16px",fontSize:15,border:"1px solid "+(err?"var(--red)":"var(--bdr)"),borderRadius:10,marginBottom:12,fontFamily:"'JetBrains Mono',monospace",outline:"none",background:err?"rgba(185,28,28,0.04)":"var(--bg)"}}/>
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:10}}>Incorrect password</div>}
        <button type="submit" disabled={checking||!pw} style={{width:"100%",padding:"12px",fontSize:15,fontWeight:600,borderRadius:10,border:"none",background:checking?"var(--bdr)":"var(--acc)",color:"#fff",cursor:checking?"wait":"pointer",opacity:checking?0.6:1}}>
          {checking?"Checking...":"Sign In"}
        </button>
      </form>
    </div>
  </div>;
}

  return <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"8px 14px",marginBottom:12,fontSize:12,color:"var(--red)",fontWeight:500}}>
    {"\u26A0\uFE0F "}{alerts.join(" · ")}
  </div>;
}

function PulseBar({agg,xeroChannels,klavLive,current7d,range}){
  if(!agg)return null;
  const dtcRev=agg.tr;const metaSpend=agg.tms;const days=agg.d;
  const dtcRatio=xeroChannels.dtc/xeroChannels.rev;
  const estTotalRev=dtcRatio>0?dtcRev/dtcRatio:dtcRev;
  const varRatio=XERO_VAR/XERO.rev;
  const fixedMonthly=XERO_FIXED/XERO.months;
  const estVariable=estTotalRev*varRatio;
  const estFixed=fixedMonthly*(days/30);
  const estProfit=estTotalRev-estVariable-metaSpend-estFixed;
  const profPct=estTotalRev>0?estProfit/estTotalRev*100:0;
  const dtcMer=dtcRev>0?metaSpend/dtcRev*100:null;
  const emailPct=klavLive?agg.emailPct:null;
  const fcPct=estTotalRev>0?estFixed/estTotalRev*100:0;
  const aov=agg.aov;
  // Compute 7d equivalents for trend arrows
  let prof7=null,mer7=null,email7=null,fc7=null,aov7=null;
  if(current7d&&range!==7){
    const c7r=current7d.tr;const c7ms=current7d.tms;
    const c7est=dtcRatio>0?c7r/dtcRatio:c7r;
    const c7var=c7est*varRatio;const c7fc=fixedMonthly*(7/30);
    const c7prof=c7est-c7var-c7ms-c7fc;
    prof7=c7est>0?c7prof/c7est*100:null;
    mer7=c7r>0?c7ms/c7r*100:null;
    email7=klavLive?current7d.emailPct:null;
    fc7=c7est>0?c7fc/c7est*100:null;
    aov7=current7d.aov;
  }
  const pills=[
    {l:"Profit",v:profPct,v7:prof7,fmt:"%",s:gs(profPct,BM.np)},
    {l:"DTC MER",v:dtcMer,v7:mer7,fmt:"%",s:dtcMer!=null?gs(dtcMer,BM.mer):"n",inv:true},
    {l:"Email",v:emailPct,v7:email7,fmt:"%",s:emailPct!=null?gs(emailPct,BM.em):"n"},
    {l:"Fixed",v:fcPct,v7:fc7,fmt:"%",s:gs(fcPct,BM.fc),inv:true},
    {l:"AOV",v:aov,v7:aov7,fmt:"$",s:aov>=70?"h":aov>=50?"w":"c"},
  ];
  return <div className="pulse-bar">
    {pills.map((p,i)=>{
      const val=p.fmt==="%"?fp(p.v):f$(p.v);
      const icon=p.s==="h"?"\u2705":p.s==="w"?"\u26A0\uFE0F":p.s==="c"?"\uD83D\uDD34":"\u2014";
      // Trend arrow from 7d
      let arrow="";
      if(p.v7!=null&&p.v!=null&&p.v!==0){
        const ch=((p.v7-p.v)/Math.abs(p.v))*100;
        if(Math.abs(ch)>=2){const good=p.inv?(ch<0):(ch>0);arrow=good?" \u2191":" \u2193";}
      }
      return <span key={i} className={"pulse-pill"+(p.s==="c"?" pulse-pill-red":"")} data-s={p.s}>{p.l}: {val} {icon}{arrow}</span>;
    })}
  </div>;
}

      if(kd)overrides.e=kd.e;
      if(sd||md||kd||gd)return{...row,...overrides};
      return row;
    });
    const existDates=new Set(merged.map(r=>r.d));
    if(shopLive?.daily){
      shopLive.daily.forEach(d=>{
        if(!existDates.has(d.date)){
          const md=metaMap[d.date]||{ms:0,mp:0,mv:0};

          existDates.add(d.date);

    const sessSource=ga4Days>0?"ga4":"manual";
    return {d:data.length,tr,to,ti,ts,te,tms,tmp,tmv,tsess,sessDays,

      aov:to>0?tr/to:0,mer:tr>0&&tms>0?(tms/tr)*100:null,
      avgRev:tr/data.length,avgOrd:to/data.length,
      shipPct:tr>0?(ts/tr)*100:0,emailPct:tr>0?(te/tr)*100:null,
      metaROAS:tms>0?tmv/tms:null,cpp:tmp>0?tms/tmp:null,
      cr:useSess>0?(to/useSess)*100:null,rps:useSess>0?tr/useSess:null,
      useSess,useSessDays,
      startDate:data[0]?.d,endDate:data[data.length-1]?.d,
    };
  };

  const agg=useMemo(()=>computeAgg(vis),[vis,sessData]);
  const prevAgg=useMemo(()=>computeAgg(prevVis),[prevVis,sessData]);

  // B1: Always compute last-7-day aggregate regardless of selected range
  const current7d=useMemo(()=>{
    const now=new Date().toISOString().split('T')[0];
    const weekAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
    const weekData=mergedD.filter(d=>d.d>=weekAgo&&d.d<=now);
    return computeAgg(weekData);
  },[mergedD,sessData]);

  // ═══════════ TOOL 8: ANOMALY DETECTION (persistent) ═══════════
  const anomalies=useMemo(()=>{
    if(!agg||!mergedD.length)return [];
    const alerts=[];
    const yDate=new Date(Date.now()-86400000).toISOString().split("T")[0];
    const yd=mergedD.find(d=>d.d===yDate);
    if(yd&&mergedD.length>2){
      const d2=mergedD.find(d=>d.d===new Date(Date.now()-2*86400000).toISOString().split("T")[0]);
      if(d2&&d2.r>100&&yd.r<d2.r*0.7) alerts.push({icon:"🔴",msg:"Revenue dropped "+Math.round((1-yd.r/d2.r)*100)+"% vs day before",tab:"daily",sev:3});
      if(yd.ms>0&&yd.mp>0){
        const ydCpp=yd.ms/yd.mp;
        const last7=mergedD.filter(d=>d.d>=new Date(Date.now()-8*86400000).toISOString().split("T")[0]&&d.d<yDate&&d.ms>0&&d.mp>0);
        if(last7.length>3){
          const avg7cpp=last7.reduce((s,d)=>s+d.ms,0)/last7.reduce((s,d)=>s+d.mp,0);
          if(ydCpp>avg7cpp*1.4) alerts.push({icon:"📢",msg:"Meta CPP "+f$(ydCpp)+" is "+Math.round((ydCpp/avg7cpp-1)*100)+"% above 7d avg",tab:"meta",sev:2});
        }

          2:{title:"PROFITABLE \u2014 CONSTRAINED",rx:"SCALE revenue to leverage fixed costs. Fixed costs don't change when you double revenue. Your "+f$(fixedMo)+"/mo fixed costs are "+fp(estFcPct)+" at current revenue but would be "+fp(target700k)+" at $700K/yr.",
             math:"At current run rate ("+annualRevStr+"/yr), fixed costs = "+fp(fcAtCurrent)+". At $700K/yr = "+fp(target700k)+". At $1M/yr = "+fp(target1m)+". That difference IS the profit.",
             dont:"Don't cut fixed costs that enable growth (people, systems). Don't pause ads \u2014 you need MORE throughput, not less.",
             path:["CALIBRATE: Verify MER < 35% and creative is working","SCALE: Push daily spend up 20%/week via Scale Challenge","LEVERAGE: Watch FC% drop as revenue grows"]},
          3:{title:"BREAKEVEN ZONE",rx:"FIX efficiency before scaling. Near breakeven means scaling will amplify losses, not create profit.",
             math:"Profit margin is only "+fp(estProfPct)+". Variable costs at "+fp(estVarPct)+" and MER at "+fp(estDtcMer)+" leave almost nothing after fixed costs of "+fp(estFcPct)+".",
             dont:"Don't scale. Don't increase ad spend. Don't launch new products. Fix the equation first.",
             path:["CALIBRATE: Get MER under 35% \u2014 kill underperforming ads","FIX: Increase RPV (conversion rate \u00D7 AOV)","THEN SCALE: Only after 2 weeks of consistent profitability"]},
          5:{title:"UNPROFITABLE \u2014 FIX IN ORDER",rx:"Multiple ratios out of range. Fix in this exact order: (1) MER first \u2014 get marketing efficient (2) VC second \u2014 fix margins (3) Then scale.",
             math:"Losing "+f$(Math.abs(estProfit))+" over "+days+"d. MER "+fp(estDtcMer)+", Variable "+fp(estVarPct)+", Fixed "+fp(estFcPct)+". Must fix unit economics before anything else.",
             dont:"Don't scale. Don't increase spend. Don't launch new channels. Fix the equation.",
             path:["STOP: Cut all unprofitable ad campaigns immediately","FIX MER: Target < 35% \u2014 diagnose CPP vs RPV","FIX VC: Renegotiate suppliers, optimize packaging"]}
        };
        const pb=playbooks[situation]||playbooks[2];
        return <div style={{background:"var(--card)",border:"2px solid "+sitColor+"44",borderRadius:14,padding:18,marginBottom:16}}>
          <div style={{fontSize:11,color:sitColor,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,marginBottom:8}}>EE Situation {situation} Playbook</div>
          <div style={{fontSize:15,fontWeight:700,color:"var(--t1)",marginBottom:8}}>{pb.title}</div>
          <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.7,marginBottom:12,padding:12,background:sitColor+"08",borderRadius:8,borderLeft:"3px solid "+sitColor}}>{pb.rx}</div>
          <div style={{fontSize:12,color:"var(--t2)",lineHeight:1.6,marginBottom:12,padding:10,background:"rgba(0,0,0,0.02)",borderRadius:8,fontFamily:"'JetBrains Mono',monospace"}}>
            <span style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase"}}>The Math</span><br/>{pb.math}
          </div>
          <div style={{fontSize:12,color:"var(--red)",marginBottom:14,padding:8,background:"rgba(185,28,28,0.05)",borderRadius:6}}>
            <strong>Do NOT:</strong> {pb.dont}
          </div>
          <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,fontWeight:600}}>Prescribed Pathway</div>
          {pb.path.map((step,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
            <span style={{fontSize:11,fontWeight:700,color:sitColor,fontFamily:"'JetBrains Mono',monospace",minWidth:18}}>{i+1}.</span>
            <span style={{fontSize:12,color:"var(--t2)"}}>{step}</span>
          </div>)}
        </div>;
      })()}

      {/* THREE CONSTRAINTS */}
      {(()=>{
        // Efficiency: based on variable costs + MER
        const effScore=(estVarPct<=40&&estDtcMer<=35)?"green":(estVarPct<=50&&estDtcMer<=45)?"yellow":"red";
        const effLabel=effScore==="green"?"Healthy \u2014 costs and MER in range":effScore==="yellow"?"Warning \u2014 "+(estDtcMer>35?"MER "+fp(estDtcMer)+" above 35%":"")+(estVarPct>40?(estDtcMer>35?" + ":"")+"VC "+fp(estVarPct)+" above 40%":""):"Critical \u2014 fix before scaling";
        // Throughput: based on traffic + conversion rate
        const cr=agg.cr;const sess=agg.useSess;
        const tpScore=(cr!=null&&cr>=2.5)?"green":(cr!=null&&cr>=1.5)?"yellow":cr!=null?"red":"yellow";
        const tpLabel=cr!=null?(tpScore==="green"?"Healthy \u2014 CR "+fp(cr)+" above 2.5%":tpScore==="yellow"?"Warning \u2014 CR "+fp(cr)+" (target >2.5%)":"Critical \u2014 CR "+fp(cr)+" below 1.5%"):"Needs session data \u2014 paste in Daily tab";
        // Determine primary bottleneck
        const scores={bandwidth:1,efficiency:effScore==="red"?3:effScore==="yellow"?2:0,throughput:tpScore==="red"?3:tpScore==="yellow"?2:0};
        const primary=scores.efficiency>=scores.throughput?(scores.efficiency>0?"efficiency":"none"):(scores.throughput>0?"throughput":"none");
        const cColors={green:"var(--grn)",yellow:"var(--ylw)",red:"var(--red)"};
        const cBg={green:"rgba(21,128,61,0.06)",yellow:"rgba(146,64,14,0.06)",red:"rgba(185,28,28,0.06)"};
        return <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,fontWeight:600}}>Three Constraints Analysis</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[
              {name:"Bandwidth",icon:"\uD83D\uDCE6",score:"yellow",label:"Stock capacity \u2014 needs assessment",detail:"Can you fulfill 2x orders without breaking?",isPrimary:false},
              {name:"Efficiency",icon:"\u2699\uFE0F",score:effScore,label:effLabel,detail:"MER "+fp(estDtcMer)+" \u00B7 VC "+fp(estVarPct)+" \u00B7 CM "+fp(contribMargin),isPrimary:primary==="efficiency"},
              {name:"Throughput",icon:"\uD83D\uDE80",score:tpScore,label:tpLabel,detail:sess?"Sessions: "+fn(sess)+" \u00B7 CR: "+(cr!=null?fp(cr):"\u2014"):"No session data",isPrimary:primary==="throughput"},
            ].map((c,i)=><div key={i} style={{background:cBg[c.score],border:c.isPrimary?"2px solid "+cColors[c.score]:"1px solid "+cColors[c.score]+"33",borderRadius:12,padding:14,position:"relative"}}>
              {c.isPrimary&&<div style={{position:"absolute",top:-8,left:12,background:cColors[c.score],color:"#fff",fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:4,textTransform:"uppercase"}}>Primary Bottleneck</div>}
              <div style={{fontSize:20,marginBottom:4}}>{c.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",marginBottom:4}}>{c.name}</div>
              <div style={{width:8,height:8,borderRadius:4,background:cColors[c.score],display:"inline-block",marginRight:6,verticalAlign:"middle"}}/>
              <span style={{fontSize:11,color:cColors[c.score],fontWeight:600}}>{c.score==="green"?"Healthy":c.score==="yellow"?"Warning":"Critical"}</span>
              <div style={{fontSize:11,color:"var(--t2)",marginTop:6,lineHeight:1.5}}>{c.label}</div>
              <div style={{fontSize:10,color:"var(--t3)",marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{c.detail}</div>
            </div>)}
          </div>
        </div>;
      })()}

      {/* TARGETS PROGRESS */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:16,marginBottom:16}}>
        <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Monthly Targets (prorated from {days}d)</div>
        <TargetBar label="DTC Revenue" current={dtcRev/(days/30)} target={TARGETS.monthlyDtcRev} fmt="$"/>
        <TargetBar label="Ad Spend Budget" current={metaSpend/(days/30)} target={TARGETS.monthlyAdSpend} fmt="$" inv/>
        <TargetBar label="AOV" current={aov} target={TARGETS.aov} fmt="$"/>
        {emailPct!=null&&<TargetBar label="Email Rev %" current={emailPct} target={TARGETS.emailPct} fmt="%"/>}
        <TargetBar label="Meta ROAS" current={roas||0} target={TARGETS.metaROAS} fmt="x"/>
      </div>

      {/* DTC LIVE PERFORMANCE */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>DTC Performance \u2014 {days} Days</h2>
          <Src s="SHOPIFY + META \u00B7 LIVE"/>
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>Online store only. {agg.startDate} \u2192 {agg.endDate}{prevAgg?" \u00B7 vs prior "+prevAgg.d+"d ("+prevAgg.startDate+" \u2192 "+prevAgg.endDate+")":""}</div>

      {(()=>{
          const renderCards=(cards)=>cards.map((m,i)=>{
            const dv=m.f==="$"?f$(m.v):m.f==="%"?fp(m.v):m.v!=null?m.v.toFixed(2):"\u2014";
            const s=(m.bm&&showBenchmarks)?gs(m.v,m.bm):"n";
            // 7d sub-indicator
            const fv7=m.v7d!=null?(m.f==="$"?f$(m.v7d):m.f==="%"?fp(m.v7d):m.v7d!=null?m.v7d.toFixed(2):null):null;
            let arrow7="",arrowCol="var(--t3)";
            if(m.v7d!=null&&m.v!=null&&m.v!==0){
              const ch7=((m.v7d-m.v)/Math.abs(m.v))*100;
              if(Math.abs(ch7)<2){arrow7="\u2192";arrowCol="var(--t3)";}
              else{const good7=m.inv?(ch7<0):(ch7>0);arrow7=good7?"\u2191":"\u2193";arrowCol=good7?"var(--grn)":"var(--red)";}
            }
            return <div key={i} style={{background:SB[s],border:"1px solid "+SC[s]+"33",borderRadius:12,padding:14}}>
              <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4,fontWeight:500}}>{m.l}</div>
              <div style={{fontSize:m.big?28:22,fontWeight:700,color:SC[s],fontFamily:"'JetBrains Mono',monospace"}}>{dv}</div>
              {range!==7&&fv7&&<div style={{fontSize:11,color:arrowCol,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>7d: {fv7} {arrow7}</div>}
              {m.sub&&showBenchmarks&&<div style={{fontSize:9,color:"var(--t3)",marginTop:1}}>{m.sub}</div>}
              {m.pv!=null&&<Chg curr={m.v} prev={m.pv} inv={m.inv} fmt={m.fmt}/>}
            </div>;
          });
          const ClusterLabel=({children})=><div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:6,marginTop:14,paddingBottom:4,borderBottom:"1px solid var(--bdr)"}}>{children}</div>;
          return <>
            <ClusterLabel>Revenue</ClusterLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
              {renderCards([
                {l:"DTC Revenue",v:dtcRev,pv:pDtcRev,f:"$",fmt:"$",big:true,v7d:c7?c7.tr:null},
                {l:"Orders",v:orders,pv:pOrders,f:"n",v7d:c7?c7.to:null},
                {l:"AOV",v:aov,pv:pAov,f:"$",fmt:"$",v7d:c7?c7.aov:null},
              ])}
            </div>
            <ClusterLabel>Marketing</ClusterLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
              {renderCards([
                {l:"Meta Spend",v:metaSpend,pv:pMetaSpend,f:"$",fmt:"$",inv:true,v7d:c7?c7.tms:null},
                {l:"DTC MER",v:mer,pv:pMer,f:"%",bm:BM.mer,inv:true,sub:"benchmark <35%",v7d:c7?c7.mer:null},
                {l:"Meta ROAS",v:roas,pv:pRoas,f:"n",sub:"last-click",v7d:c7?c7.metaROAS:null},
                {l:"CPP",v:cpp,f:"$",inv:true,sub:"cost per purchase",v7d:c7?c7.cpp:null},
              ])}
            </div>
            <ClusterLabel>Channels</ClusterLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
              {renderCards([
                ...(emailPct!=null?[{l:"Email Rev %",v:emailPct,f:"%",bm:BM.em,sub:"benchmark 30-40%",v7d:c7?c7.emailPct:null}]:[]),
                {l:"Shipping %",v:a.shipPct,f:"%",sub:"of DTC revenue",v7d:c7?c7.shipPct:null},
              ])}
            </div>
            <ClusterLabel>Traffic</ClusterLabel>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
              {renderCards([
                {l:"Sessions",v:a.useSess||null,f:"n",sub:a.sessSource==="ga4"?a.ga4Days+"d GA4 data":"paste in Daily tab",v7d:c7?c7.useSess:null},
                {l:"Conv Rate",v:a.cr,f:"%",bm:{h:[2.5,100],w:[1.5,2.5]},sub:"orders / sessions"+(a.sessSource==="ga4"?" (GA4)":""),v7d:c7?c7.cr:null},
                {l:"Rev/Session",v:a.rps,f:"$",sub:"RPV = CR \u00D7 AOV"+(a.sessSource==="ga4"?" (GA4)":""),v7d:c7?c7.rps:null},
              ])}
            </div>
          </>;
        })()}
      </div>

      {/* CURRENT 7-DAY SNAPSHOT (hidden when viewing 7d already) */}
      {range!==7&&c7&&(()=>{
        const _fv=(v,f)=>v==null?"\u2014":f==="$"?f$(v):f==="%"?fp(v):f==="x"?(v||0).toFixed(2)+"x":fn(v);
        const _rows=[
          {l:"DTC Revenue",v:c7.tr,pv:dtcRev,f:"$"},
          {l:"Orders",v:c7.to,pv:orders,f:"n"},
          {l:"AOV",v:c7.aov,pv:aov,f:"$"},
          {l:"Meta Spend",v:c7.tms,pv:metaSpend,f:"$",inv:true},
          {l:"DTC MER",v:c7.mer,pv:mer,f:"%",inv:true},
          {l:"Meta ROAS",v:c7.metaROAS,pv:roas,f:"x"},
          {l:"Conv Rate",v:c7.cr,pv:agg.cr,f:"%"},
          {l:"Rev/Session",v:c7.rps,pv:agg.rps,f:"$"},
        ];
        return <div style={{marginBottom:16}}>
          <button onClick={()=>setShow7dSnapshot(!show7dSnapshot)} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,color:"var(--t2)",display:"flex",alignItems:"center",gap:6,marginBottom:show7dSnapshot?10:0}}>
            <span>{show7dSnapshot?"\u25B4":"\u25BE"}</span> Current 7-Day Snapshot
          </button>
          {show7dSnapshot&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:16,overflowX:"auto"}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>Last 7 days vs {days}d period average (daily rate comparison)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
              {_rows.map((r,i)=>{
                const t=trend7d(r.v,r.pv,r.inv);
                return <div key={i} style={{textAlign:"center",padding:10,background:"rgba(0,0,0,0.02)",borderRadius:8}}>
                  <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",marginBottom:3}}>{r.l}</div>
                  <div style={{fontSize:16,fontWeight:700,color:t.color,fontFamily:"'JetBrains Mono',monospace"}}>{_fv(r.v,r.f)}</div>
                  <div style={{fontSize:10,color:t.color}}>{t.arrow} vs {_fv(r.pv,r.f)} ({days}d)</div>
                </div>;
              })}
            </div>
          </div>}
        </div>;
      })()}

      {/* THE EQUATION */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>The Ecommerce Equation \u2014 Est. Full Business ({days}d)</h2>
          <Src s="SHOPIFY + XERO RATIOS"/>
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>DTC from Shopify. Wholesale & costs estimated using Xero annual ratios (DTC {Math.round(dtcRatio*100)}%, WH {Math.round(whRatio*100)}%, Intl {Math.round(intlRatio*100)}%).</div>

        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:20,marginBottom:14}}>
          <div style={{fontSize:10,color:"var(--t3)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.06em"}}>Revenue \u2212 Variable \u2212 Marketing \u2212 Fixed = Profit</div>
          {[
            {l:"Est. Total Revenue",v:estTotalRev,p:100,bm:null,note:"DTC "+f$(dtcRev)+" + Est. WH "+f$(estWholesale)+" + Intl "+f$(estIntl)},
            {l:"Variable Costs",v:estVariable,p:estVarPct,bm:BM.vc,target:"< 40%",note:fp(varRatio*100)+" from Xero"},
            {l:"Marketing",v:metaSpend,p:estMerPct,bm:BM.mer,target:"< 35%",note:"Meta + Google actual spend"},
            {l:"Fixed Costs",v:estFixed,p:estFcPct,bm:BM.fc,target:"< 20%",note:f$(fixedMonthly)+"/mo \u00D7 "+(days/30).toFixed(1)+" mo"},
            {l:"NET PROFIT",v:estProfit,p:estProfPct,bm:BM.np,target:"> 10%"},
          ].map((r,i)=>{
            const s=r.bm?gs(r.p,r.bm):"n";
            const col=i===0?"#1d4ed8":SC[s];
            const bg=i===0?"#2563eb":SC[s];
            return <div key={i} style={{marginBottom:i<4?10:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,color:i===4?"var(--t1)":"var(--t3)",fontWeight:i===4?700:400}}>
                  {i>0&&i<4?"\u2212 ":i===4?"= ":""}{r.l}
                  {r.target&&<span style={{fontSize:9,color:"var(--t3)",marginLeft:6}}>{r.target}</span>}
                </span>
                <span style={{fontSize:13,fontWeight:700,color:col,fontFamily:"'JetBrains Mono',monospace"}}>{f$(r.v)} ({fp(r.p)})</span>
              </div>
              <div style={{height:i===4?6:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(Math.abs(r.p),100)+"%",background:bg+"88",borderRadius:2}}/>
              </div>
              {r.note&&<div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>{r.note}</div>}
            </div>;
          })}
        </div>
      </div>

      {/* EE BENCHMARK SCORECARD — Traffic Light Grid */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>EE Benchmark Scorecard — {days} Day Period</div>
        {(()=>{
          const tiles=[
            {l:"Variable Costs",v:estVarPct,b:BM.vc,t:"< 40%",fmt:"%"},
            {l:"DTC MER",v:estDtcMer,b:BM.mer,t:"< 35%",fmt:"%"},
            {l:"Fixed Costs",v:estFcPct,b:BM.fc,t:"< 20%",fmt:"%"},
            {l:"Net Profit",v:estProfPct,b:BM.np,t:"> 10%",fmt:"%"},
            ...(emailPct!=null?[{l:"Email Rev %",v:emailPct,b:BM.em,t:"30–40%",fmt:"%"}]:[{l:"Email Rev %",v:null,b:BM.em,t:"30–40%",fmt:"%"}]),
            {l:"LER",v:ler,b:{h:[2,100],w:[1.5,2]},t:"> $2",fmt:"$"},
            {l:"AOV",v:aov,b:{h:[70,500],w:[50,70]},t:"> $70",fmt:"$"},
            {l:"Meta ROAS",v:roas||0,b:{h:[2.5,100],w:[1.5,2.5]},t:"> 2.5x",fmt:"x"},
            ...(ltgpCac!=null?[{l:"LTGP:CAC",v:ltgpCac,b:{h:[3,100],w:[2,3]},t:"> 3:1",fmt:"x"}]:[]),
          ];
          return <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {tiles.map((m,i)=>{
              const s=m.v!=null?gs(m.v,m.b):"n";
              const dv=m.v==null?"—":m.fmt==="$"?m.v.toFixed(2):m.fmt==="x"?(m.v).toFixed(2)+"x":fp(m.v);
              const icon=s==="h"?"✅":s==="w"?"⚠️":s==="c"?"🔴":"—";
              return <div key={i} style={{background:SB[s],border:"1px solid "+SC[s]+"33",borderRadius:12,padding:14,textAlign:"center"}}>
                <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}}>{m.l}</div>
                <div style={{fontSize:22,fontWeight:700,color:SC[s],fontFamily:"'JetBrains Mono',monospace"}}>{dv} <span style={{fontSize:14}}>{icon}</span></div>
                <div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Target: {m.t}</div>
              </div>;
            })}
          </div>;
        })()}
      </div>

      {/* CHANNEL COMPARISON */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>Channel Comparison ({days}d Est.)</h2>
          <Src s="SHOPIFY + XERO RATIOS"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
          {[
            {label:"DTC (Online)",rev:dtcRev,color:"#2563eb",adSpend:metaSpend,mer:estDtcMer,icon:"\uD83D\uDED2",source:"Shopify live"},
            {label:"Wholesale (est.)",rev:estWholesale,color:"#7c3aed",adSpend:0,mer:0,icon:"\uD83C\uDFEA",source:"Xero ratio"},
            {label:"International (est.)",rev:estIntl,color:"#0e7490",adSpend:0,mer:0,icon:"\uD83C\uDF0F",source:"Xero ratio"},
          ].map((ch,i)=>{
            const pct=estTotalRev>0?Math.round(ch.rev/estTotalRev*100):0;
            return <div key={i} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:14,textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:2}}>{ch.icon}</div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{ch.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:ch.color,fontFamily:"'JetBrains Mono',monospace",margin:"4px 0"}}>{f$(ch.rev)}</div>
              <div style={{fontSize:10,color:"var(--t3)"}}>{pct}% of total</div>
              <div style={{marginTop:8,padding:"6px",background:ch.adSpend>0?"rgba(239,68,68,0.06)":"rgba(16,185,129,0.06)",borderRadius:6}}>
                {ch.adSpend>0?<>

          (gscData&&!gscData.error&&gscData.topQueries?"ORGANIC SEARCH (Google Search Console):\n- Total Clicks: "+fn(gscData.summary.totalClicks)+" · Impressions: "+fn(gscData.summary.totalImpressions)+" · Avg CTR: "+gscData.summary.avgCTR.toFixed(1)+"% · Avg Position: "+gscData.summary.avgPosition.toFixed(1)+"\n- Top keywords: "+gscData.topQueries.slice(0,8).map(function(q){return q.query+" (pos "+q.position.toFixed(1)+", "+q.clicks+" clicks, "+q.ctr.toFixed(1)+"% CTR)";}).join("; ")+"\n- Page 1 keywords (pos <10): "+gscData.topQueries.filter(function(q){return q.position<10;}).length+" of "+gscData.topQueries.length+"\n\n":"")+
          "Use the RPV = CR x AOV framework (High Conversion Website methodology). Compare against Conversion Catalyst benchmarks (594 brands, median CR 1.8%, top quartile 3.2%). "+
          "Apply the Three Pillars: DESIGN (speed, mobile-first, social proof above fold), FRICTION (checkout simplification, trust signals, objection handling), SELLING (bundles, upsells, free shipping threshold). "+
          "Identify whether CR or AOV is the bigger lever. Reference EE benchmark: every 1s speed improvement lifts CR ~7%.\n\n"+
          "FOCUS THIS WEEK: The single highest-impact website change to lift RPV. Then 3-4 additional specific recommendations with numbers."+(clarityData&&clarityData.metrics?" Include UX health insights from Clarity data — flag friction issues.":"")+(gscData&&!gscData.error&&gscData.topQueries?" Include SEO insights — keyword opportunities, branded vs non-branded search health, pages with high impressions but low CTR.":"");

        {loading&&<div style={{...cardS,textAlign:"center",color:"var(--t3)",fontSize:13}}>Loading website data...</div>}

        {/* Section 1: RPV Hero */}
        {!loading&&(wd||ga)&&<div style={{...cardS,textAlign:"center",padding:24,background:"linear-gradient(135deg,rgba(59,91,219,0.04),rgba(21,128,61,0.04))"}}>
          <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Revenue Per Visit — The Grand Equalizer</div>

            <span style={{fontSize:16,color:"var(--t3)"}}>×</span>
            <span style={{padding:"4px 12px",background:"rgba(0,0,0,0.04)",borderRadius:6}}>AOV {f$(aov)}</span>
            <span style={{fontSize:16,color:"var(--t3)"}}>=</span>
            <span style={{padding:"4px 12px",background:"rgba(0,0,0,0.04)",borderRadius:6,fontWeight:600}}>RPV {"$"+rpv.toFixed(2)}</span>

        {/* Conversion Catalyst Ranking */}
        {!loading&&ga&&totalSessions>0&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:14}}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[
              {metric:"Conversion Rate",val:cr,unit:"%",levels:[{l:"Bottom 25%",v:1.0},{l:"Median",v:1.8},{l:"75th",v:2.8},{l:"Top quartile",v:3.2},{l:"Top 10%",v:4.5}]},
              {metric:"RPV",val:rpv,unit:"$",levels:[{l:"Below avg",v:1.5},{l:"Average",v:2.0},{l:"Good",v:2.5},{l:"Very Good",v:4.0},{l:"Excellent",v:6.0}]},

          </div>}
          {cr>=2.5&&aov<70&&<div style={{marginTop:10,fontSize:11,color:"var(--ylw)",padding:"8px 10px",background:"rgba(146,64,14,0.05)",borderRadius:6}}>
            CR is solid \u2014 AOV is the lever. Test bundles at 15% discount, free shipping threshold at {"$"+Math.round(aov*1.15)}, and post-purchase upsells to lift RPV.
          </div>}
        </div>}

        {/* Section 2: Key Metrics Grid */}
        {!loading&&(wd||ga)&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
          {[
            {l:"Sessions",v:fn(totalSessions),sub:"GA4",color:totalSessions>0?"var(--t1)":"var(--t3)"},
            {l:"Conversion Rate",v:cr.toFixed(2)+"%",sub:"Top quartile: 3.2%",color:crColor},
            {l:"AOV",v:f$(aov),sub:"Benchmark: >$70",color:aov>=70?"var(--grn)":aov>=50?"var(--ylw)":"var(--red)"},

            {l:"New Customers",v:newPct.toFixed(0)+"%",sub:"Healthy: 40-60%",color:newPct>=40&&newPct<=60?"var(--grn)":newPct>0?"var(--ylw)":"var(--t3)"},
            {l:"Returning",v:retPct.toFixed(0)+"%",sub:fn(wd?wd.customerBreakdown.returning.orders:0)+" orders",color:retPct>=40&&retPct<=60?"var(--grn)":retPct>0?"var(--ylw)":"var(--t3)"},

          </div>)}
        </div>}

            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase"}}>Engagement Rate</div>

            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase"}}>Bounce Rate</div>

            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase"}}>Avg Duration</div>
              <div style={{fontSize:18,fontWeight:700,color:"var(--t1)",fontFamily:"'JetBrains Mono',monospace"}}>{avgDuration>=60?Math.floor(avgDuration/60)+"m "+Math.round(avgDuration%60)+"s":Math.round(avgDuration)+"s"}</div>
            </div>
          </div>
        </div>}

        {/* Section 5: Traffic Sources */}
        {ga&&ga.trafficSources&&ga.trafficSources.length>0&&<div style={cardS}>

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>
                <th style={thS}>Channel</th>
                <th style={{...thS,textAlign:"right"}}>Sessions</th>
                <th style={{...thS,textAlign:"right"}}>Conversions</th>

                  </tr>;
                })}

            </table>

        </div>}

        {/* Section 5b: Organic Search Performance (GSC) */}
        {gscLoading&&<div style={{...cardS,textAlign:"center",color:"var(--t3)",fontSize:13}}>Loading Search Console data...</div>}
        {gscData&&gscData.error&&gscData.status===403&&<div style={{...cardS,borderColor:"var(--ylw)",background:"rgba(234,179,8,0.06)"}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>Organic Search — Scope Required</div>
          <div style={{fontSize:12,color:"var(--t2)"}}>{gscData.message}</div>
        </div>}
        {gscData&&gscData.error&&gscData.status!==403&&<div style={{...cardS,borderColor:"var(--ylw)",background:"rgba(234,179,8,0.06)"}}>

        {gscData&&!gscData.error&&(()=>{
          const gs=gscData.summary||{};

          const posColor=function(p){return p<=3?"var(--grn)":p<=10?"var(--ylw)":"var(--red)";};

          return <div style={cardS}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600}}>Organic Search Performance <span style={{fontSize:10,background:"rgba(234,88,12,0.08)",color:"#ea580c",padding:"2px 6px",borderRadius:4,marginLeft:6}}>SEARCH CONSOLE</span></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>

                    <th style={{...thS,textAlign:"right"}}>Impressions</th>
                    <th style={{...thS,textAlign:"right"}}>CTR</th>
                    <th style={{...thS,textAlign:"right"}}>Avg Position</th>

                      </tr>;

            {ga.devices.map((d,i)=>{
              const icon=d.device==="desktop"?"\uD83D\uDCBB":d.device==="mobile"?"\uD83D\uDCF1":d.device==="tablet"?"\uD83D\uDCF2":"\uD83C\uDF10";

           {week:"Ongoing",text:"Track fixed costs as absolute $ monthly. Only flag if they increase without corresponding revenue growth."},
         ]},

        {type:metaROAS>=2.5?"opportunity":"warning",icon:"📊",title:"Meta is "+metaPctBudget+"% of Ad Budget at "+(metaROAS?metaROAS.toFixed(2):"—")+"x ROAS — "+(metaPctBudget>=80?"Diversification Risk":"Monitor"),
         body:"With <strong>"+_metaSpend+"</strong> on Meta in this "+days+"d window ("+metaPctBudget+"% of ad spend), "+(metaPctBudget>=80?"you have platform concentration risk":"monitor channel mix")+". At "+(metaROAS?metaROAS.toFixed(2):"—")+"x ROAS, the channel is "+(metaROAS>=2?"performing adequately":"underperforming")+" — test diversification into Google Shopping"+(gads?" (currently "+_gSpend+" at "+_gRoas+"x ROAS)":"")+", TikTok, and organic/SEO as insurance."+(bestMonth?" Best performing month was <strong>"+bestMonth.month+"</strong> at "+bestMonth.roas+"x ROAS.":""),
         actions:[
           {week:"Week 1–2",text:"Increase Google Shopping budget — test Performance Max with product feed optimization."},
           {week:"Week 3–4",text:"Launch 2 TikTok creative tests ($50/day) — repurpose top Meta UGC."},
           {week:"Month 2",text:"Target channel mix: 70% Meta / 20% Google / 10% TikTok within 6 months."},
         ]},

        {type:"opportunity",icon:"💰",title:"AOV at $"+Math.round(currentAOV)+" — Each $10 Lift Drops DTC MER by ~"+Math.round(dtcMerVal-(dtcMerVal*currentAOV/(currentAOV+10)))+" Points",
         body:"AOV is the most powerful lever for improving MER without changing ad spend. Increasing from $"+Math.round(currentAOV)+" to $"+(Math.round(currentAOV)+15)+" through bundles and upsells means each order generates more revenue at the same CPA, pulling DTC MER toward <strong>"+(dtcMerVal*currentAOV/(currentAOV+15)).toFixed(1)+"%</strong>.",
         actions:[
           {week:"Week 1",text:"Implement cart upsell — 'Add Bedtime Bestie' or 'Complete the Bundle' with small incentive."},
           {week:"Week 2",text:"Create Complete Care Bundle at $89 (Calm Balm + Lotion Potion + Soft Suds) on PDP and homepage."},
           {week:"Week 3",text:"Test free shipping threshold at $"+(Math.round(currentAOV/5)*5+10)+" to incentivize larger carts."},
         ]},

        {type:"info",icon:"🏪",title:"Wholesale ("+whPct+"%) vs DTC ("+dtcPct+"%) — Strategic Implications",
         body:"Channel mix (Xero ratio): wholesale at <strong>"+whPct+"%</strong> vs DTC at <strong>"+dtcPct+"%</strong> vs international at <strong>"+intlPct+"%</strong>. This "+(whPct>dtcPct?"is unusual for a brand investing "+_metaSpend+" in digital ads":"reflects your channel strategy")+". Key question: <strong>does retail drive its own demand, or does DTC marketing create awareness that converts at Farmers?</strong> If the latter, DTC ad spend is partially subsidising wholesale — making true DTC MER even worse.",
         actions:[
           {week:"Week 1",text:"Survey 50 recent Farmers customers: 'How did you first hear about Noody?' — quantify DTC→Retail halo."},
           {week:"Week 2",text:"Geographic test: pause Meta in one region for 2 weeks, track if Farmers sales there decline."},
         ]},

        {type:vcPct<=40?"opportunity":"warning",icon:vcPct<=40?"✅":"⚠️",title:"Variable Costs at "+vcPct.toFixed(1)+"% — "+(vcPct<=40?"Healthy, Room to Fine-Tune":"Above 40% Benchmark"),
         body:"Variable costs are <strong>"+(vcPct<=40?"below":"above")+" the 40% benchmark</strong>. Product margins are "+(vcPct<=40?"solid, giving room to absorb some marketing inefficiency":"tight — needs attention")+". COGS at "+fp(XERO.cogs/XERO.rev*100)+", shipping at "+fp(XERO.postage/XERO.rev*100)+", packaging at "+fp(XERO.pkg/XERO.rev*100)+" (Xero ratios). Minor optimisation: negotiate courier rates at your volume, and review Afterpay merchant fees.",
         actions:[
           {week:"This Month",text:"Review courier contract — at your shipment volume, negotiate rates or test NZ Post vs CourierPost."},
         ]},

        {type:npPct>=10?"opportunity":npPct>=5?"warning":"critical",icon:"🎯",title:"Situation "+situation+": "+(npPct>=10?"Profitable":npPct>=0?"Near Breakeven":"Unprofitable")+" at "+npPct.toFixed(1)+"% — "+(npPct>=10?"Scale":"Fix")+" Roadmap",
         body:"You're in <strong>Situation "+situation+"</strong>. The playbook: Calibrate → Scale → Optimise. Profit margin of "+npPct.toFixed(1)+"% is "+(npPct>=10?"above the 10% minimum":"below target")+". "+(dtcMerVal>35||fcPct>20?"<strong>DTC MER at "+dtcMerVal.toFixed(1)+"%</strong> and <strong>fixed costs at "+fcPct.toFixed(1)+"%</strong> mean you need revenue growth more than cost cutting.":"")+" The EE framework says: when profitable with high fixed %, the answer is almost always SCALE — grow revenue to leverage the fixed cost base. LER at "+ler.toFixed(2)+" "+(ler>=2?"confirms wages are generating sufficient gross margin":"needs improvement")+".",
         actions:[
           {week:"Week 1: Calibrate",text:"Lock in all EE inputs with live data. Verify Xero P&L matches tracking. Set 90-day targets."},
           {week:"Week 2: Stabilise Email",text:"Get email revenue floor above 25% of DTC revenue. Activate all automated flows."},
           {week:"Week 3: AOV Push",text:"Launch bundle strategy and cart upsell. Target AOV $"+Math.round(currentAOV)+" → $"+(Math.round(currentAOV)+15)+"."},
           {week:"Week 4: Scale Test",text:"Increase Meta spend by 15% on top 3 campaigns. Monitor weekly — if DTC MER doesn't worsen, continue."},
         ]},
      ];

      const critCount=insights.filter(i=>i.type==="critical").length;
      const warnCount=insights.filter(i=>i.type==="warning").length;
      const oppCount=insights.filter(i=>i.type==="opportunity").length;
      const infoCount=insights.filter(i=>i.type==="info").length;
      const totalActions=insights.reduce((a,ins)=>a+(ins.actions?ins.actions.length:0),0);
      const typeColors={critical:"var(--red)",warning:"var(--ylw)",opportunity:"var(--grn)",info:"var(--acc)"};
      const typeBg={critical:"rgba(239,68,68,0.06)",warning:"rgba(245,158,11,0.06)",opportunity:"rgba(16,185,129,0.06)",info:"rgba(79,110,247,0.06)"};
      const typeBdr={critical:"rgba(239,68,68,0.25)",warning:"rgba(245,158,11,0.25)",opportunity:"rgba(16,185,129,0.25)",info:"rgba(79,110,247,0.25)"};

      return <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:700,margin:0,color:"#a78bfa"}}>✦ Strategic Insights — {days} Days</h2>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>Auto-generated from {a.startDate} → {a.endDate} × Ecommerce Equation benchmarks</div>
          </div>
          <div style={{fontSize:10,color:"var(--t3)"}}>{(shopLive?"Shopify ✓ ":"")+(metaLive?"Meta ✓ ":"")+(gads?"Google ✓ ":"")+(xeroLive?"Xero ✓":"")}</div>
        </div>

        {/* EE Equation Health at a Glance */}
        <div style={{background:"var(--card)",border:"2px solid "+(situation===1?"var(--grn)":situation<=2?"var(--ylw)":"var(--red)")+"44",borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>EE Equation Health — S{situation}</div>
            <div style={{fontSize:22,fontWeight:800,color:npPct>=10?"var(--grn)":npPct>=5?"var(--ylw)":"var(--red)",fontFamily:"'JetBrains Mono',monospace"}}>{fp(npPct)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {[
              {l:"VC %",v:vcPct,ok:vcPct<=40,target:"<40%"},
              {l:"MER",v:dtcMerVal,ok:dtcMerVal<=35,target:"<35%"},
              {l:"FC %",v:fcPct,ok:fcPct<=20,target:"<20%"},
              {l:"Email",v:emailAvg||0,ok:emailAvg>=30,target:">30%"},
              {l:"LER",v:ler,ok:ler>=2,target:">$2"},
            ].map(function(m,i){return <div key={i} style={{textAlign:"center",padding:6,background:m.ok?"rgba(21,128,61,0.06)":"rgba(185,28,28,0.06)",borderRadius:6}}>
              <div style={{fontSize:9,color:"var(--t3)",textTransform:"uppercase"}}>{m.l}</div>
              <div style={{fontSize:14,fontWeight:700,color:m.ok?"var(--grn)":"var(--red)",fontFamily:"'JetBrains Mono',monospace"}}>{m.l==="LER"?m.v.toFixed(2):fp(m.v)}</div>
              <div style={{fontSize:8,color:"var(--t3)"}}>{m.target} {m.ok?"\u2705":"\u274C"}</div>
            </div>;})}
          </div>
        </div>

        {/* Summary pills */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:20}}>
          {[
            {n:critCount,l:"Critical",c:"var(--red)"},
            {n:warnCount,l:"Warnings",c:"var(--ylw)"},
            {n:oppCount,l:"Opportunities",c:"var(--grn)"},
            {n:infoCount,l:"Informational",c:"var(--acc)"},
            {n:totalActions,l:"Actions",c:"#a78bfa"},
          ].map((p,i)=><div key={i} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:700,color:p.c,fontFamily:"'JetBrains Mono',monospace"}}>{p.n}</div>
            <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{p.l}</div>
          </div>)}
        </div>

        {/* 6-WEEK GAME PLAN */}
        {(()=>{
          // Determine which week Noody should be in
          var weekPhase="1-2",phaseLabel="CALIBRATE",phaseColor="#1d4ed8",phaseDesc="Lock in data, verify tracking, identify situation and constraint.";
          if(situation===1&&dtcMerVal<=35&&fcPct<=25){weekPhase="5-6";phaseLabel="SCALE TEST";phaseColor="#15803d";phaseDesc="Equation is profitable. Increase ad spend 15-20% on top performers, test new creative.";}
          else if(npPct>=5){weekPhase="3-4";phaseLabel="QUICK WINS";phaseColor="#92400e";phaseDesc="Fix obvious gaps \u2014 activate flows, optimize form, increase campaign cadence, pause villain ads.";}
          return <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:16}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>EE 6-Week Game Plan \u2014 Where Is Noody?</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {[
                {w:"1-2",l:"Calibrate",d:"Lock in data, verify tracking, set benchmarks",c:"#1d4ed8"},
                {w:"3-4",l:"Quick Wins",d:"Fix flows, form, campaign cadence, pause bad ads",c:"#92400e"},
                {w:"5-6",l:"Scale Test",d:"Increase spend 15% if profitable, test new creative",c:"#15803d"},
              ].map((phase,i)=>{
                var isActive=phase.w===weekPhase;
                return <div key={i} style={{background:isActive?phase.c+"14":"transparent",border:"1px solid "+(isActive?phase.c+"4d":"var(--bdr)"),borderRadius:10,padding:12,textAlign:"center",opacity:isActive?1:0.5}}>
                  <div style={{fontSize:10,color:"var(--t3)"}}>WEEK {phase.w}</div>
                  <div style={{fontSize:14,fontWeight:700,color:isActive?phase.c:"var(--t2)",marginTop:2}}>{phase.l}</div>
                  <div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>{phase.d}</div>
                  {isActive&&<div style={{fontSize:10,fontWeight:600,color:phase.c,marginTop:6}}>👈 CURRENT PHASE</div>}
                </div>;
              })}
            </div>
            <div style={{marginTop:10,padding:12,background:phaseColor+"0a",border:"1px solid "+phaseColor+"33",borderRadius:8}}>
              <div style={{fontSize:12,fontWeight:600,color:phaseColor}}>Week {weekPhase}: {phaseLabel}</div>
              <div style={{fontSize:11,color:"var(--t2)",marginTop:4}}>{phaseDesc}</div>
            </div>
          </div>;
        })()}

        {/* Insight cards */}
        {insights.map((ins,idx)=><div key={idx} style={{
          background:typeBg[ins.type],
          border:"1px solid "+typeBdr[ins.type],
          borderLeft:"4px solid "+typeColors[ins.type],
          borderRadius:12,padding:20,marginBottom:12
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:20}}>{ins.icon}</span>
            <div style={{fontSize:15,fontWeight:600,color:"var(--t1)"}}>{ins.title}</div>
          </div>
          <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:ins.body}}/>
          {ins.actions&&ins.actions.map((a,ai)=><div key={ai} style={{
            marginTop:ai===0?12:6,padding:"10px 14px",
            background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",
            borderLeft:"3px solid #a78bfa",borderRadius:"0 8px 8px 0"
          }}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:"#a78bfa",marginBottom:3}}>↳ {a.week}</div>
            <div style={{fontSize:12,color:"var(--t1)"}}>{a.text}</div>
          </div>)}
        </div>)}

        {/* Monthly ROAS trend */}
        {monthlyRoas.length>2&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:8,textTransform:"uppercase"}}>Meta ROAS by Month</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={monthlyRoas}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb"/>
              <XAxis dataKey="month" tick={{fill:"#6b7280",fontSize:9}}/>
              <YAxis yAxisId="roas" tick={{fill:"#6b7280",fontSize:9}} domain={[0,"auto"]}/>
              <YAxis yAxisId="spend" orientation="right" tick={{fill:"#6b7280",fontSize:9}}/>
              <Tooltip contentStyle={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:8,fontSize:11}}/>
              <Bar yAxisId="spend" dataKey="spend" fill="#a855f722" radius={[3,3,0,0]} name="Meta Spend ($)"/>
              <Line yAxisId="roas" type="monotone" dataKey="roas" stroke="#15803d" strokeWidth={2} dot={{r:3}} name="ROAS"/>
              <ReferenceLine yAxisId="roas" y={2.5} stroke="#92400e66" strokeDasharray="3 3" label={{value:"2.5x target",fill:"#92400e",fontSize:9}}/>
            </ComposedChart>
          </ResponsiveContainer>
          {bestMonth&&worstMonth&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
            <div style={{background:"rgba(16,185,129,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>BEST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#15803d",fontFamily:"'JetBrains Mono',monospace"}}>{bestMonth.month} — {bestMonth.roas}x</div>
            </div>
            <div style={{background:"rgba(239,68,68,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>WORST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#b91c1c",fontFamily:"'JetBrains Mono',monospace"}}>{worstMonth.month} — {worstMonth.roas}x</div>
            </div>
          </div>}
        </div>}

        {/* Quick reference benchmarks */}
        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>Ecommerce Equation Benchmarks vs Actuals</div>
          <div style={{display:"grid",gap:8}}>
            {[
              {l:"Variable Costs",actual:vcPct,target:"< 40%",status:vcPct<=40?"h":vcPct<=50?"w":"c"},
              {l:"MER (Blended)",actual:merPct,target:"< 35%",status:merPct<=35?"h":merPct<=45?"w":"c"},
              {l:"MER (DTC-Only)",actual:dtcMerVal,target:"< 35%",status:dtcMerVal<=35?"h":dtcMerVal<=45?"w":"c"},
              {l:"Fixed Costs",actual:fcPct,target:"< 20%",status:fcPct<=20?"h":fcPct<=30?"w":"c"},
              {l:"Net Profit",actual:npPct,target:"> 10%",status:npPct>=10?"h":npPct>=5?"w":"c"},
              {l:"Email Rev %",actual:emailAvg,target:"30–40%",status:emailAvg>=30&&emailAvg<=40?"h":emailAvg>=15?"w":"c"},
              {l:"LER",actual:ler,target:"> $2.00",status:ler>=2?"h":ler>=1.5?"w":"c",fmt:"$"},
            ].map((b,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<6?"1px solid var(--bdr)":"none"}}>
              <span style={{fontSize:13,color:"var(--t2)"}}>{b.l}</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:9,color:"var(--t3)"}}>{b.target}</span>
                <span style={{fontSize:14,fontWeight:700,color:SC[b.status],fontFamily:"'JetBrains Mono',monospace"}}>{b.fmt==="$"?b.actual.toFixed(2):fp(b.actual)}</span>
                <span style={{fontSize:12}}>{b.status==="h"?"✅":b.status==="w"?"⚠️":"🔴"}</span>
              </div>
            </div>)}
          </div>
        </div>
      </>;
    })()}

    </div>
  </div>;
}
function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem(AUTH_KEY)==="1");
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  return <Dashboard/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
