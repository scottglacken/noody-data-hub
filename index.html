function gs(v,b){if(!b||v==null)return"n";if(v>=b.h[0]&&v<=b.h[1])return"h";if(v>=b.w[0]&&v<=b.w[1])return"w";return"c";}

const fp=n=>n==null?"—":n.toFixed(1)+"%";
const fn=n=>n==null?"—":Math.round(n).toLocaleString();

function MC({l,v,fmt,bm,sub,big}){
  let dv=fmt==="$"?f$(v):fmt==="%"?fp(v):fn(v);
  let s=bm?gs(v,bm):"n";
  return <div style={{background:SB[s],border:"1px solid "+SC[s]+"33",borderRadius:12,padding:big?"20px 18px":"16px",minWidth:0,transition:"all .2s"}}>

  </div>;
}

      aov:v.ord>0?Math.round(v.rev/v.ord):0,orders:v.ord,
      roas:v.meta>0?Math.round(v.mv/v.meta*100)/100:0,

    d:d.d.slice(5),rev:Math.round(d.r),meta:Math.round(d.ms),aov:d.o>0?Math.round(d.r/d.o):0,orders:d.o,
    mer:d.r>0&&d.ms>0?Math.round(d.ms/d.r*1000)/10:null,

  const PIES=[
    {name:"DTC",value:XERO.dtc,color:"#2563eb"},
    {name:"Wholesale",value:XERO.wh,color:"#7c3aed"},
    {name:"International",value:XERO.intl,color:"#06b6d4"},
  ];

  // Channel data computed in Equation tab IIFE

  return <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--t1)",fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    

    <div style={{padding:"18px 24px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--acc),#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"var(--t1)"}}>Σ</div>
        <div><div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em",color:"var(--t1)"}}>NOODY SKINCARE</div>
        <div style={{fontSize:10,color:"var(--t3)"}}>Shopify + Meta + Google Ads + Xero · {mergedD.length} days{(shopLive||metaLive)?" (live)":""}</div></div>
      </div>
      <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
        <Tab a={tab==="equation"} onClick={()=>setTab("equation")} icon="💰">Equation</Tab>
        <Tab a={tab==="daily"} onClick={()=>setTab("daily")} icon="📊">Daily</Tab>
        <Tab a={tab==="meta"} onClick={()=>setTab("meta")} icon="📢">Meta Ads</Tab>
        <Tab a={tab==="diagnose"} onClick={()=>setTab("diagnose")} icon="🔬">Diagnose</Tab>
        <Tab a={tab==="scale"} onClick={()=>setTab("scale")} icon="🚀">Scale Model</Tab>
        <Tab a={tab==="gads"} onClick={()=>setTab("gads")} icon="🎯">Google Ads</Tab>
        <Tab a={tab==="xero"} onClick={()=>setTab("xero")} icon="📋">Xero P&L</Tab>
        <Tab a={tab==="insights"} onClick={()=>setTab("insights")} icon="✦" accent="#7c3aed">Insights</Tab>
      </div>
      <button onClick={toggleTheme} style={{padding:"10px",background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:10,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",width:44,height:44,transition:"all .2s",color:"var(--t2)",flexShrink:0}} title={theme==="dark"?"Light mode":"Dark mode"}>{theme==="dark"?"☀️":"🌙"}</button>
    </div>

    {(tab==="equation"||tab==="daily"||tab==="meta"||tab==="insights"||tab==="diagnose"||tab==="scale")&&<div style={{padding:"6px 20px",display:"flex",gap:3,alignItems:"center",flexWrap:"wrap"}}>
      {[7,14,30,90,180,365].map(r=><button key={r} onClick={()=>{setRange(r);setCustomFrom("");setCustomTo("");}} style={{padding:"8px 16px",fontSize:13,borderRadius:8,minHeight:36,cursor:"pointer",background:!customFrom&&range===r?"var(--acc)":"var(--card)",color:!customFrom&&range===r?"#fff":"var(--t2)",border:!customFrom&&range===r?"1px solid var(--acc)":"1px solid var(--bdr)"}}>{r}d</button>)}
      <span style={{fontSize:11,color:"var(--t3)",margin:"0 4px"}}>or</span>
      <input type="date" value={customFrom} onChange={e=>{setCustomFrom(e.target.value);}} style={{padding:"6px 8px",fontSize:12,borderRadius:6,background:"var(--card)",border:"1px solid var(--bdr)",color:"var(--t1)",fontFamily:"'JetBrains Mono',monospace"}}/>
      <span style={{fontSize:11,color:"var(--t3)"}}>→</span>
      <input type="date" value={customTo} onChange={e=>{setCustomTo(e.target.value);}} style={{padding:"6px 8px",fontSize:12,borderRadius:6,background:"var(--card)",border:"1px solid var(--bdr)",color:"var(--t1)",fontFamily:"'JetBrains Mono',monospace"}}/>
      {(shopLoading||metaLoading||xeroLoading||klavLoading)&&<span style={{fontSize:12,color:"var(--t3)",marginLeft:8}}>⏳ Refreshing...</span>}
      <span style={{fontSize:10,color:"var(--t3)",marginLeft:"auto"}}>{vis.length} days{agg?" · "+agg.startDate+" → "+agg.endDate:""} · {(shopLive?"Shopify ✓ ":"")+(metaLive?"Meta ✓ ":"")+(klavLive?"Klaviyo ✓ ":"")+(gads?"Google ✓ ":"")+(xeroLive?"Xero ✓":"")}</span>
    </div>}

    <div style={{padding:"24px 28px",maxWidth:1400,margin:"0 auto"}}>

    {tab==="equation"&&(()=>{
      if(!agg)return <div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>Loading data...</div>;

      // All metrics from selected range
      const a=agg; const p=prevAgg;
      const dtcRev=a.tr;
      const metaSpend=a.tms;
      const orders=a.to;
      const aov=a.aov;
      const mer=a.mer;
      const roas=a.metaROAS;
      const cpp=a.cpp;
      const emailPct=a.emailPct;
      const emailRev=a.te;
      const days=a.d;

      // Estimated full-business using Xero ratios
      const whRatio=XERO.wh/XERO.rev;
      const intlRatio=XERO.intl/XERO.rev;
      const dtcRatio=XERO.dtc/XERO.rev;
      const estTotalRev=dtcRatio>0?dtcRev/dtcRatio:dtcRev;
      const estWholesale=estTotalRev*whRatio;
      const estIntl=estTotalRev*intlRatio;
      const varRatio=XERO_VAR/XERO.rev;
      const fixedMonthly=XERO_FIXED/XERO.months;
      const estVariable=estTotalRev*varRatio;
      const estFixed=fixedMonthly*(days/30);
      const estProfit=estTotalRev-estVariable-metaSpend-estFixed;
      const estVarPct=estTotalRev>0?estVariable/estTotalRev*100:0;
      const estMerPct=estTotalRev>0?metaSpend/estTotalRev*100:0;
      const estDtcMer=dtcRev>0?metaSpend/dtcRev*100:0;
      const estFcPct=estTotalRev>0?estFixed/estTotalRev*100:0;
      const estProfPct=estTotalRev>0?estProfit/estTotalRev*100:0;
      const ler=(estTotalRev-estVariable)/(XERO.wages/XERO.months*(days/30));

      // Previous period
      const pDtcRev=p?p.tr:null;
      const pMetaSpend=p?p.tms:null;
      const pOrders=p?p.to:null;
      const pAov=p?p.aov:null;
      const pMer=p?p.mer:null;
      const pRoas=p?p.metaROAS:null;

      // Change arrow component
      const Chg=({curr,prev,inv,fmt:f})=>{
        const ch=pctChange(curr,prev);
        if(ch==null)return null;
        const good=inv?ch<0:ch>0;
        const col=Math.abs(ch)<2?"var(--t3)":good?"var(--grn)":"var(--red)";
        const arrow=ch>0?"\u25B2":ch<0?"\u25BC":"\u2014";
        return <div style={{fontSize:10,color:col,marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>
          {arrow} {Math.abs(ch).toFixed(1)}% vs prior {days}d
          {f==="$"&&prev!=null&&<span style={{color:"var(--t3)"}}> ({f$(prev)})</span>}
        </div>;
      };

      // Source tag
      const Src=({s})=><span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"rgba(79,110,247,0.1)",color:"var(--acc)",fontWeight:600,letterSpacing:"0.03em",marginLeft:6,verticalAlign:"middle"}}>{s}</span>;

      // Situation
      let situation=1,sitLabel="PROFITABLE",sitColor="var(--grn)";
      if(estProfPct<0){situation=5;sitLabel="UNPROFITABLE";sitColor="var(--red)";}
      else if(estProfPct<5){situation=3;sitLabel="BREAKEVEN ZONE";sitColor="var(--ylw)";}
      else if(estProfPct<10||estDtcMer>45||estFcPct>25){situation=2;sitLabel="PROFITABLE \u2014 CONSTRAINED";sitColor="var(--ylw)";}

      return <>

      {/* SITUATION BANNER */}
      <div style={{background:sitColor+"11",border:"1px solid "+sitColor+"33",borderRadius:14,padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:28,fontWeight:700,color:sitColor,fontFamily:"'JetBrains Mono',monospace",minWidth:80,textAlign:"center"}}>S{situation}</div>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:sitColor}}>{sitLabel}</div>
          <div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>
            {situation===1?"Equation is healthy. Focus on SCALING.":
             situation===2?"Profitable but constrained. DTC MER "+fp(estDtcMer)+", Fixed "+fp(estFcPct)+".":
             situation===3?"Near breakeven. Fix efficiency before scaling.":
             "Multiple constraints. Fix unit economics first."}
          </div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:700,color:sitColor,fontFamily:"'JetBrains Mono',monospace"}}>{fp(estProfPct)}</div>
          <div style={{fontSize:10,color:"var(--t3)"}}>est. net profit</div>
        </div>
      </div>

      {/* DTC LIVE PERFORMANCE */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>DTC Performance \u2014 {days} Days</h2>
          <Src s="SHOPIFY + META \u00B7 LIVE"/>
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>Online store only. {agg.startDate} \u2192 {agg.endDate}{prevAgg?" \u00B7 vs prior "+prevAgg.d+"d ("+prevAgg.startDate+" \u2192 "+prevAgg.endDate+")":""}</div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
          {[
            {l:"DTC Revenue",v:dtcRev,pv:pDtcRev,f:"$",fmt:"$"},
            {l:"Orders",v:orders,pv:pOrders,f:"n"},
            {l:"AOV",v:aov,pv:pAov,f:"$",fmt:"$"},
            {l:"Meta Spend",v:metaSpend,pv:pMetaSpend,f:"$",fmt:"$",inv:true},
            {l:"DTC MER",v:mer,pv:pMer,f:"%",bm:BM.mer,inv:true,sub:"benchmark <35%"},
            {l:"Meta ROAS",v:roas,pv:pRoas,f:"n",sub:"last-click"},
            {l:"CPP",v:cpp,f:"$",inv:true,sub:"cost per purchase"},
            {l:"Email Rev %",v:emailPct,f:"%",bm:BM.em,sub:"benchmark 30-40%"},
            {l:"Shipping %",v:a.shipPct,f:"%",sub:"of DTC revenue"},
          ].map((m,i)=>{
            const dv=m.f==="$"?f$(m.v):m.f==="%"?fp(m.v):m.v!=null?m.v.toFixed(2):"\u2014";
            const s=m.bm?gs(m.v,m.bm):"n";
            return <div key={i} style={{background:SB[s],border:"1px solid "+SC[s]+"33",borderRadius:12,padding:14}}>
              <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4,fontWeight:500}}>{m.l}</div>
              <div style={{fontSize:i===0?28:22,fontWeight:700,color:SC[s],fontFamily:"'JetBrains Mono',monospace"}}>{dv}</div>
              {m.sub&&<div style={{fontSize:9,color:"var(--t3)",marginTop:1}}>{m.sub}</div>}
              {m.pv!=null&&<Chg curr={m.v} prev={m.pv} inv={m.inv} fmt={m.fmt}/>}
            </div>;
          })}
        </div>
      </div>

      {/* THE EQUATION */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>The Ecommerce Equation \u2014 Est. Full Business ({days}d)</h2>
          <Src s="SHOPIFY + XERO RATIOS"/>
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>DTC from Shopify. Wholesale & costs estimated using Xero annual ratios (DTC {Math.round(dtcRatio*100)}%, WH {Math.round(whRatio*100)}%, Intl {Math.round(intlRatio*100)}%).</div>

        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:20,marginBottom:14}}>
          <div style={{fontSize:10,color:"var(--t3)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.06em"}}>Revenue \u2212 Variable \u2212 Marketing \u2212 Fixed = Profit</div>
          {[
            {l:"Est. Total Revenue",v:estTotalRev,p:100,bm:null,note:"DTC "+f$(dtcRev)+" + Est. WH "+f$(estWholesale)+" + Intl "+f$(estIntl)},
            {l:"Variable Costs",v:estVariable,p:estVarPct,bm:BM.vc,target:"< 40%",note:fp(varRatio*100)+" from Xero"},
            {l:"Marketing",v:metaSpend,p:estMerPct,bm:BM.mer,target:"< 35%",note:"Meta + Google actual spend"},
            {l:"Fixed Costs",v:estFixed,p:estFcPct,bm:BM.fc,target:"< 20%",note:f$(fixedMonthly)+"/mo \u00D7 "+(days/30).toFixed(1)+" mo"},
            {l:"NET PROFIT",v:estProfit,p:estProfPct,bm:BM.np,target:"> 10%"},
          ].map((r,i)=>{
            const s=r.bm?gs(r.p,r.bm):"n";
            const col=i===0?"#93c5fd":SC[s];
            const bg=i===0?"#2563eb":SC[s];
            return <div key={i} style={{marginBottom:i<4?10:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,color:i===4?"#fff":"#9ca3af",fontWeight:i===4?700:400}}>
                  {i>0&&i<4?"\u2212 ":i===4?"= ":""}{r.l}
                  {r.target&&<span style={{fontSize:9,color:"var(--t3)",marginLeft:6}}>{r.target}</span>}
                </span>
                <span style={{fontSize:13,fontWeight:700,color:col,fontFamily:"'JetBrains Mono',monospace"}}>{f$(r.v)} ({fp(r.p)})</span>
              </div>
              <div style={{height:i===4?6:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(Math.abs(r.p),100)+"%",background:bg+"88",borderRadius:2}}/>
              </div>
              {r.note&&<div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>{r.note}</div>}
            </div>;
          })}
        </div>
      </div>

      {/* EE BENCHMARK SCORECARD */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:20}}>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>EE Benchmark Scorecard \u2014 {days} Day Period</div>
        {[
          {l:"Variable Costs",v:estVarPct,b:BM.vc,t:"< 40%",note:"Xero ratio applied to est. revenue"},
          {l:"Blended MER",v:estMerPct,b:BM.mer,t:"< 35%",note:"Ad spend \u00F7 est. total revenue"},
          {l:"DTC-Only MER",v:estDtcMer,b:BM.mer,t:"< 35%",note:"Ad spend \u00F7 Shopify DTC revenue \u2014 the REAL cost"},
          {l:"Fixed Costs",v:estFcPct,b:BM.fc,t:"< 20%",note:f$(fixedMonthly)+"/mo prorated to "+days+"d"},
          {l:"Net Profit",v:estProfPct,b:BM.np,t:"> 10%",note:"Estimated from equation"},
          {l:"Email Rev %",v:emailPct||0,b:BM.em,t:"30\u201340%",note:f$(emailRev)+" email \u00F7 "+f$(dtcRev)+" DTC"},
          {l:"LER",v:ler,b:{h:[2,100],w:[1.5,2]},t:"> $2.00",note:"Est. gross margin \u00F7 prorated wages",fmt:"$"},
          {l:"AOV",v:aov,b:{h:[70,500],w:[50,70]},t:"> $70",note:fn(orders)+" orders",fmt:"$"},
          {l:"Meta ROAS",v:roas||0,b:{h:[2.5,100],w:[1.5,2.5]},t:"> 2.5x",note:"Purchase value \u00F7 Meta spend",fmt:"x"},
        ].map((m,i)=>{
          const s=gs(m.fmt==="$"||m.fmt==="x"?m.v:m.v,m.b);
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<8?"1px solid var(--bdr)":"none"}}>
            <div>
              <div style={{fontSize:12,color:"var(--t2)",fontWeight:500}}>{m.l}</div>
              <div style={{fontSize:9,color:"var(--t3)",marginTop:1}}>{m.note}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:9,color:"var(--t3)"}}>{m.t}</span>
              <span style={{fontSize:14,fontWeight:700,color:SC[s],fontFamily:"'JetBrains Mono',monospace"}}>
                {m.fmt==="$"?m.v.toFixed(2):m.fmt==="x"?(m.v||0).toFixed(2)+"x":fp(m.v)}
              </span>
              <span style={{fontSize:13}}>{s==="h"?"\u2705":s==="w"?"\u26A0\uFE0F":"\uD83D\uDD34"}</span>
            </div>
          </div>;
        })}
      </div>

      {/* CHANNEL COMPARISON */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>Channel Comparison ({days}d Est.)</h2>
          <Src s="SHOPIFY + XERO RATIOS"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
          {[
            {label:"DTC (Online)",rev:dtcRev,color:"#2563eb",adSpend:metaSpend,mer:estDtcMer,icon:"\uD83D\uDED2",source:"Shopify live"},
            {label:"Wholesale (est.)",rev:estWholesale,color:"#7c3aed",adSpend:0,mer:0,icon:"\uD83C\uDFEA",source:"Xero ratio"},
            {label:"International (est.)",rev:estIntl,color:"#06b6d4",adSpend:0,mer:0,icon:"\uD83C\uDF0F",source:"Xero ratio"},
          ].map((ch,i)=>{
            const pct=estTotalRev>0?Math.round(ch.rev/estTotalRev*100):0;
            return <div key={i} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:14,textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:2}}>{ch.icon}</div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{ch.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:ch.color,fontFamily:"'JetBrains Mono',monospace",margin:"4px 0"}}>{f$(ch.rev)}</div>
              <div style={{fontSize:10,color:"var(--t3)"}}>{pct}% of total</div>
              <div style={{marginTop:8,padding:"6px",background:ch.adSpend>0?"rgba(239,68,68,0.06)":"rgba(16,185,129,0.06)",borderRadius:6}}>
                {ch.adSpend>0?<>
                  <div style={{fontSize:10,color:"var(--t3)"}}>MER: <strong style={{color:"var(--red)"}}>{fp(ch.mer)}</strong></div>
                  <div style={{fontSize:9,color:"var(--red)"}}>Spend: {f$(ch.adSpend)}</div>
                </>:<div style={{fontSize:10,color:"var(--grn)",fontWeight:600}}>$0 ad cost</div>}
              </div>
              <div style={{fontSize:8,color:"var(--t3)",marginTop:4}}>{ch.source}</div>
            </div>;
          })}
        </div>

        {/* MER comparison */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:"rgba(16,185,129,0.08)",borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontSize:10,color:"var(--t3)"}}>BLENDED MER</div>
            <div style={{fontSize:24,fontWeight:700,color:"#10b981",fontFamily:"'JetBrains Mono',monospace"}}>{fp(estMerPct)}</div>
            <div style={{fontSize:9,color:"var(--t3)"}}>ad spend \u00F7 total revenue</div>
          </div>
          <div style={{background:"rgba(239,68,68,0.08)",borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontSize:10,color:"var(--t3)"}}>DTC-ONLY MER</div>
            <div style={{fontSize:24,fontWeight:700,color:"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{fp(estDtcMer)}</div>
            <div style={{fontSize:9,color:"var(--t3)"}}>ad spend \u00F7 DTC revenue only</div>
          </div>
        </div>
      </div>

      {/* PERIOD-OVER-PERIOD COMPARISON */}
      {prevAgg&&<div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>Period Comparison</h2>
          <Src s="SHOPIFY + META"/>
        </div>
        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
            <thead><tr style={{borderBottom:"2px solid var(--bdr)"}}>
              <th style={{padding:"8px",textAlign:"left",color:"var(--t3)",fontSize:10,fontWeight:500}}>METRIC</th>
              <th style={{padding:"8px",textAlign:"right",color:"var(--t3)",fontSize:10}}>PRIOR ({prevAgg.d}d)</th>
              <th style={{padding:"8px",textAlign:"right",color:"var(--t3)",fontSize:10}}>CURRENT ({a.d}d)</th>
              <th style={{padding:"8px",textAlign:"right",color:"var(--t3)",fontSize:10}}>CHANGE</th>
            </tr></thead>
            <tbody>{[
              {l:"DTC Revenue",c:dtcRev,pv:pDtcRev,f:"$"},
              {l:"Orders",c:orders,pv:pOrders,f:"n"},
              {l:"AOV",c:aov,pv:pAov,f:"$"},
              {l:"Meta Spend",c:metaSpend,pv:pMetaSpend,f:"$",inv:true},
              {l:"DTC MER",c:mer,pv:pMer,f:"%",inv:true},
              {l:"Meta ROAS",c:roas,pv:pRoas,f:"x"},
              {l:"CPP",c:cpp,pv:p?p.cpp:null,f:"$",inv:true},
              {l:"Email Rev %",c:emailPct,pv:p?p.emailPct:null,f:"%"},
            ].map((row,i)=>{
              const ch=pctChange(row.c,row.pv);
              const good=ch!=null?(row.inv?ch<0:ch>0):null;

         actions:[
           {week:"Week 1",text:"Implement cart upsell — 'Add Bedtime Bestie' or 'Complete the Bundle' with small incentive."},
           {week:"Week 2",text:"Create Complete Care Bundle at $89 (Calm Balm + Lotion Potion + Soft Suds) on PDP and homepage."},
           {week:"Week 3",text:"Test free shipping threshold at $"+(Math.round(currentAOV/5)*5+10)+" to incentivize larger carts."},
         ]},

        {type:"info",icon:"🏪",title:`Wholesale (${whPct}%) vs DTC (${dtcPct}%) — Strategic Implications`,
         body:`Channel mix (Xero ratio): wholesale at <strong>${whPct}%</strong> vs DTC at <strong>${dtcPct}%</strong> vs international at <strong>${intlPct}%</strong>. This ${whPct>dtcPct?"is unusual for a brand investing "+f$(metaSpend)+" in digital ads":"reflects your channel strategy"}. Key question: <strong>does retail drive its own demand, or does DTC marketing create awareness that converts at Farmers?</strong> If the latter, DTC ad spend is partially subsidising wholesale — making true DTC MER even worse.`,
         actions:[
           {week:"Week 1",text:"Survey 50 recent Farmers customers: 'How did you first hear about Noody?' — quantify DTC→Retail halo."},
           {week:"Week 2",text:"Geographic test: pause Meta in one region for 2 weeks, track if Farmers sales there decline."},
         ]},

        {type:vcPct<=40?"opportunity":"warning",icon:vcPct<=40?"✅":"⚠️",title:`Variable Costs at ${vcPct.toFixed(1)}% — ${vcPct<=40?"Healthy, Room to Fine-Tune":"Above 40% Benchmark"}`,
         body:`Variable costs are <strong>${vcPct<=40?"below":"above"} the 40% benchmark</strong>. Product margins are ${vcPct<=40?"solid, giving room to absorb some marketing inefficiency":"tight — needs attention"}. COGS at ${fp(XERO.cogs/XERO.rev*100)}, shipping at ${fp(XERO.postage/XERO.rev*100)}, packaging at ${fp(XERO.pkg/XERO.rev*100)} (Xero ratios). Minor optimisation: negotiate courier rates at your volume, and review Afterpay merchant fees.`,
         actions:[
           {week:"This Month",text:"Review courier contract — at your shipment volume, negotiate rates or test NZ Post vs CourierPost."},
         ]},

        {type:npPct>=10?"opportunity":npPct>=5?"warning":"critical",icon:"🎯",title:`Situation ${situation}: ${npPct>=10?"Profitable":npPct>=0?"Near Breakeven":"Unprofitable"} at ${npPct.toFixed(1)}% — ${npPct>=10?"Scale":"Fix"} Roadmap`,
         body:`You're in <strong>Situation ${situation}</strong>. The playbook: Calibrate → Scale → Optimise. Profit margin of ${npPct.toFixed(1)}% is ${npPct>=10?"above the 10% minimum":"below target"}. ${dtcMerVal>35||fcPct>20?"<strong>DTC MER at "+dtcMerVal.toFixed(1)+"%</strong> and <strong>fixed costs at "+fcPct.toFixed(1)+"%</strong> mean you need revenue growth more than cost cutting.":""} The EE framework says: when profitable with high fixed %, the answer is almost always SCALE — grow revenue to leverage the fixed cost base. LER at ${ler.toFixed(2)} ${ler>=2?"confirms wages are generating sufficient gross margin":"needs improvement"}.`,
         actions:[
           {week:"Week 1: Calibrate",text:"Lock in all EE inputs with live data. Verify Xero P&L matches tracking. Set 90-day targets."},
           {week:"Week 2: Stabilise Email",text:"Get email revenue floor above 25% of DTC revenue. Activate all automated flows."},
           {week:"Week 3: AOV Push",text:"Launch bundle strategy and cart upsell. Target AOV $"+Math.round(currentAOV)+" → $"+(Math.round(currentAOV)+15)+"."},
           {week:"Week 4: Scale Test",text:"Increase Meta spend by 15% on top 3 campaigns. Monitor weekly — if DTC MER doesn't worsen, continue."},
         ]},
      ];

      const critCount=insights.filter(i=>i.type==="critical").length;
      const warnCount=insights.filter(i=>i.type==="warning").length;
      const oppCount=insights.filter(i=>i.type==="opportunity").length;
      const infoCount=insights.filter(i=>i.type==="info").length;
      const totalActions=insights.reduce((a,ins)=>a+(ins.actions?ins.actions.length:0),0);
      const typeColors={critical:"var(--red)",warning:"var(--ylw)",opportunity:"var(--grn)",info:"var(--acc)"};
      const typeBg={critical:"rgba(239,68,68,0.06)",warning:"rgba(245,158,11,0.06)",opportunity:"rgba(16,185,129,0.06)",info:"rgba(79,110,247,0.06)"};
      const typeBdr={critical:"rgba(239,68,68,0.25)",warning:"rgba(245,158,11,0.25)",opportunity:"rgba(16,185,129,0.25)",info:"rgba(79,110,247,0.25)"};

      return <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:700,margin:0,color:"#a78bfa"}}>✦ Strategic Insights — {days} Days</h2>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>Auto-generated from {a.startDate} → {a.endDate} × Ecommerce Equation benchmarks</div>
          </div>
          <div style={{fontSize:10,color:"var(--t3)"}}>{(shopLive?"Shopify ✓ ":"")+(metaLive?"Meta ✓ ":"")+(gads?"Google ✓ ":"")+(xeroLive?"Xero ✓":"")}</div>
        </div>

        {/* Summary pills */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:20}}>
          {[
            {n:critCount,l:"Critical",c:"var(--red)"},
            {n:warnCount,l:"Warnings",c:"var(--ylw)"},
            {n:oppCount,l:"Opportunities",c:"var(--grn)"},
            {n:infoCount,l:"Informational",c:"var(--acc)"},
            {n:totalActions,l:"Actions",c:"#a78bfa"},
          ].map((p,i)=><div key={i} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:700,color:p.c,fontFamily:"'JetBrains Mono',monospace"}}>{p.n}</div>
            <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{p.l}</div>
          </div>)}
        </div>

        {/* Insight cards */}
        {insights.map((ins,idx)=><div key={idx} style={{
          background:typeBg[ins.type],
          border:"1px solid "+typeBdr[ins.type],
          borderLeft:"4px solid "+typeColors[ins.type],
          borderRadius:12,padding:20,marginBottom:12
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:20}}>{ins.icon}</span>
            <div style={{fontSize:15,fontWeight:600,color:"var(--t1)"}}>{ins.title}</div>
          </div>
          <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:ins.body}}/>
          {ins.actions&&ins.actions.map((a,ai)=><div key={ai} style={{
            marginTop:ai===0?12:6,padding:"10px 14px",
            background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",
            borderLeft:"3px solid #a78bfa",borderRadius:"0 8px 8px 0"
          }}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:"#a78bfa",marginBottom:3}}>↳ {a.week}</div>
            <div style={{fontSize:12,color:"var(--t1)"}}>{a.text}</div>
          </div>)}
        </div>)}

        {/* Monthly ROAS trend */}
        {monthlyRoas.length>2&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:8,textTransform:"uppercase"}}>Meta ROAS by Month</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={monthlyRoas}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
              <XAxis dataKey="month" tick={{fill:"#6b7280",fontSize:9}}/>
              <YAxis yAxisId="roas" tick={{fill:"#6b7280",fontSize:9}} domain={[0,"auto"]}/>
              <YAxis yAxisId="spend" orientation="right" tick={{fill:"#6b7280",fontSize:9}}/>
              <Tooltip contentStyle={{background:"var(--bdr)",border:"1px solid #2d2d44",borderRadius:8,fontSize:11}}/>
              <Bar yAxisId="spend" dataKey="spend" fill="#a855f722" radius={[3,3,0,0]} name="Meta Spend ($)"/>
              <Line yAxisId="roas" type="monotone" dataKey="roas" stroke="#10b981" strokeWidth={2} dot={{r:3}} name="ROAS"/>
              <ReferenceLine yAxisId="roas" y={2.5} stroke="#f59e0b66" strokeDasharray="3 3" label={{value:"2.5x target",fill:"#f59e0b",fontSize:9}}/>
            </ComposedChart>
          </ResponsiveContainer>
          {bestMonth&&worstMonth&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
            <div style={{background:"rgba(16,185,129,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>BEST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#10b981",fontFamily:"'JetBrains Mono',monospace"}}>{bestMonth.month} — {bestMonth.roas}x</div>
            </div>
            <div style={{background:"rgba(239,68,68,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>WORST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{worstMonth.month} — {worstMonth.roas}x</div>
            </div>
          </div>}
        </div>}

        {/* Quick reference benchmarks */}
        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>Ecommerce Equation Benchmarks vs Actuals</div>
          <div style={{display:"grid",gap:8}}>
            {[
              {l:"Variable Costs",actual:vcPct,target:"< 40%",status:vcPct<=40?"h":vcPct<=50?"w":"c"},
              {l:"MER (Blended)",actual:merPct,target:"< 35%",status:merPct<=35?"h":merPct<=45?"w":"c"},
              {l:"MER (DTC-Only)",actual:dtcMerVal,target:"< 35%",status:dtcMerVal<=35?"h":dtcMerVal<=45?"w":"c"},
              {l:"Fixed Costs",actual:fcPct,target:"< 20%",status:fcPct<=20?"h":fcPct<=30?"w":"c"},
              {l:"Net Profit",actual:npPct,target:"> 10%",status:npPct>=10?"h":npPct>=5?"w":"c"},
              {l:"Email Rev %",actual:emailAvg,target:"30–40%",status:emailAvg>=30&&emailAvg<=40?"h":emailAvg>=15?"w":"c"},
              {l:"LER",actual:ler,target:"> $2.00",status:ler>=2?"h":ler>=1.5?"w":"c",fmt:"$"},
            ].map((b,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<6?"1px solid var(--bdr)":"none"}}>
              <span style={{fontSize:13,color:"var(--t2)"}}>{b.l}</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:9,color:"var(--t3)"}}>{b.target}</span>
                <span style={{fontSize:14,fontWeight:700,color:SC[b.status],fontFamily:"'JetBrains Mono',monospace"}}>{b.fmt==="$"?b.actual.toFixed(2):fp(b.actual)}</span>
                <span style={{fontSize:12}}>{b.status==="h"?"✅":b.status==="w"?"⚠️":"🔴"}</span>
              </div>
            </div>)}
          </div>
        </div>
      </>;
    })()}

    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
