function gs(v,b){if(!b||v==null)return"n";if(v>=b.h[0]&&v<=b.h[1])return"h";if(v>=b.w[0]&&v<=b.w[1])return"w";return"c";}
const SC={h:"#10b981",w:"#f59e0b",c:"#ef4444",n:"#6b7280"};
const SB={h:"rgba(16,185,129,0.08)",w:"rgba(245,158,11,0.08)",c:"rgba(239,68,68,0.08)",n:"rgba(107,114,128,0.06)"};
const f$=n=>n==null?"—":(n<0?"-":"")+"$"+Math.abs(Math.round(n)).toLocaleString();
const fp=n=>n==null?"—":n.toFixed(1)+"%";
const fn=n=>n==null?"—":Math.round(n).toLocaleString();

function MC({l,v,fmt,bm,sub,big}){
  let dv=fmt==="$"?f$(v):fmt==="%"?fp(v):fn(v);
  let s=bm?gs(v,bm):"n";
  return <div style={{background:SB[s],border:"1px solid "+SC[s]+"33",borderRadius:12,padding:big?"20px 18px":"16px",minWidth:0,transition:"all .2s"}}>
    <div style={{fontSize:12,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontWeight:500}}>{l}</div>
    <div style={{fontSize:big?32:24,fontWeight:700,color:SC[s],fontFamily:"'JetBrains Mono',monospace"}}>{dv}</div>
    {sub&&<div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>{sub}</div>}
  </div>;
}

function Tab({a,onClick,children,icon,accent}){

function TargetBar({label,current,target,fmt,inv}){
  if(current==null||target==null)return null;
  const pct=inv?Math.min(100,target>0?(target/current)*100:0):Math.min(100,target>0?(current/target)*100:0);
  const met=inv?current<=target:current>=target;
  const col=met?"var(--grn)":pct>=70?"var(--ylw)":"var(--red)";
  const fv=fmt==="$"?f$(current):fmt==="%"?fp(current):current.toFixed(2)+"x";
  const tv=fmt==="$"?f$(target):fmt==="%"?target+"%":target+"x";
  return <div style={{marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
      <span style={{color:"var(--t3)"}}>{label}</span>
      <span style={{color:col,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{fv} <span style={{color:"var(--t3)",fontWeight:400}}>/ {tv}</span></span>
    </div>
    <div style={{height:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}>
      <div style={{height:"100%",width:Math.min(pct,100)+"%",background:col,borderRadius:2,transition:"width .4s"}}/>
    </div>
  </div>;
}

function PulseBar({agg,xeroChannels,klavLive}){
  if(!agg)return null;
  const dtcRev=agg.tr;const metaSpend=agg.tms;const days=agg.d;
  const dtcRatio=xeroChannels.dtc/xeroChannels.rev;
  const estTotalRev=dtcRatio>0?dtcRev/dtcRatio:dtcRev;
  const varRatio=XERO_VAR/XERO.rev;
  const fixedMonthly=XERO_FIXED/XERO.months;
  const estVariable=estTotalRev*varRatio;
  const estFixed=fixedMonthly*(days/30);
  const estProfit=estTotalRev-estVariable-metaSpend-estFixed;
  const profPct=estTotalRev>0?estProfit/estTotalRev*100:0;
  const dtcMer=dtcRev>0?metaSpend/dtcRev*100:null;
  const emailPct=klavLive?agg.emailPct:null;
  const fcPct=estTotalRev>0?estFixed/estTotalRev*100:0;
  const aov=agg.aov;
  const pills=[
    {l:"Profit",v:profPct,fmt:"%",s:gs(profPct,BM.np)},
    {l:"DTC MER",v:dtcMer,fmt:"%",s:dtcMer!=null?gs(dtcMer,BM.mer):"n"},
    {l:"Email",v:emailPct,fmt:"%",s:emailPct!=null?gs(emailPct,BM.em):"n"},
    {l:"Fixed",v:fcPct,fmt:"%",s:gs(fcPct,BM.fc)},
    {l:"AOV",v:aov,fmt:"$",s:aov>=70?"h":aov>=50?"w":"c"},
  ];
  return <div className="pulse-bar">
    {pills.map((p,i)=>{
      const val=p.fmt==="%"?fp(p.v):f$(p.v);
      const icon=p.s==="h"?"✅":p.s==="w"?"⚠️":p.s==="c"?"🔴":"—";
      return <span key={i} className={"pulse-pill"+(p.s==="c"?" pulse-pill-red":"")} data-s={p.s}>{p.l}: {val} {icon}</span>;
    })}
  </div>;
}

  // Auto-fetch on first visit to relevant tabs
  useEffect(()=>{

  // Merge hardcoded D with live Shopify+Meta+Klaviyo+GA4 data
  const mergedD=useMemo(()=>{
    if(!shopLive&&!metaLive&&!klavLive&&!ga4)return D;
    const shopMap={};const metaMap={};const klavMap={};const ga4Map={};
    if(shopLive?.daily)shopLive.daily.forEach(d=>{shopMap[d.date]={r:d.revenue||0,o:d.orders||0,i:d.itemsSold||0,s:d.totalShipping||0};});

    if(klavLive?.daily)klavLive.daily.forEach(d=>{klavMap[d.date]={e:d.emailRevenue||0};});
    if(ga4?.daily)ga4.daily.forEach(d=>{ga4Map[d.date]={ss:d.sessions||0,gc:d.conversions||0};});
    const merged=D.map(row=>{
      const sd=shopMap[row.d];const md=metaMap[row.d];const kd=klavMap[row.d];const gd=ga4Map[row.d];
      const overrides={...(sd||{}),...(md||{}),...(gd||{})};
      if(kd)overrides.e=kd.e;
      if(sd||md||kd||gd)return{...row,...overrides};
      return row;
    });
    const existDates=new Set(merged.map(r=>r.d));
    if(shopLive?.daily){
      shopLive.daily.forEach(d=>{
        if(!existDates.has(d.date)){
          const md=metaMap[d.date]||{ms:0,mp:0,mv:0};
          const kd=klavMap[d.date]||{e:0};
          const gd=ga4Map[d.date]||{ss:0,gc:0};
          merged.push({d:d.date,r:d.revenue||0,o:d.orders||0,i:d.itemsSold||0,s:d.totalShipping||0,e:kd.e,...md,...gd});
          existDates.add(d.date);

    merged.sort((a,b)=>a.d.localeCompare(b.d));

  },[shopLive,metaLive,klavLive,ga4]);

  // Live Xero P&L for Equation tab (falls back to hardcoded XERO)
  const liveXero=useMemo(()=>{
    if(!xeroLive?.profitAndLoss?.summary)return null;
    const s=xeroLive.profitAndLoss.summary;
    return {rev:s.revenue||0,gp:s.grossProfit||0,gm:s.grossMargin||0,np:s.netProfit||0,nm:s.netMargin||0,cogs:s.cogs||0,exp:s.totalExpenses||0};
  },[xeroLive]);

  // Dynamic channel ratios from Xero P&L (override XERO_RECENT when live data available)
  const xeroChannels=useMemo(()=>{
    if(!xeroLive?.profitAndLoss?.sections)return XERO_RECENT;
    const inc=xeroLive.profitAndLoss.sections["Income"];
    if(!inc||!inc.items)return XERO_RECENT;
    let dtc=0,wh=0,intl=0,rev=0;
    inc.items.forEach(function(item){
      const n=(item.name||"").toLowerCase();const v=item.value||0;
      if(n.indexOf("online")!==-1)dtc+=v;
      else if(n==="sales - wholesale")wh+=v;
      else if(n.indexOf("wholesale international")!==-1)wh+=v;
      else if(n==="sales - international")intl+=v;
    });
    rev=inc.total||0;
    if(dtc>0&&rev>0)return {dtc:Math.round(dtc),wh:Math.round(wh),intl:Math.round(intl),rev:Math.round(rev)};
    return XERO_RECENT;
  },[xeroLive]);

  const vis=useMemo(()=>{
    if(customFrom&&customTo) return mergedD.filter(d=>d.d>=customFrom&&d.d<=customTo);
    return mergedD.slice(-range);
  },[range,mergedD,customFrom,customTo]);

  // Previous period for comparison (same length, immediately before current)
  const prevVis=useMemo(()=>{
    const len=vis.length;
    if(!len)return [];
    const idx=mergedD.indexOf(vis[0]);
    if(idx<=0)return [];
    return mergedD.slice(Math.max(0,idx-len),idx);
  },[vis,mergedD]);

  // Compute aggregates for any data slice
  const computeAgg=(data)=>{
    if(!data||!data.length)return null;
    let tr=0,to=0,ti=0,ts=0,te=0,tms=0,tmp=0,tmv=0,tsess=0,sessDays=0,tga4sess=0,tga4conv=0,ga4Days=0;
    data.forEach(d=>{tr+=d.r;to+=d.o;ti+=d.i;ts+=d.s;te+=d.e;tms+=d.ms;tmp+=d.mp;tmv+=d.mv;
      // GA4 sessions (preferred) or manual fallback
      if(d.ss&&d.ss>0){tga4sess+=d.ss;tga4conv+=d.gc||0;ga4Days++;}
      const sd=sessData[d.d];if(sd&&sd>0){tsess+=sd;sessDays++;}
    });
    // Use GA4 sessions when available, fall back to manual
    const useSess=ga4Days>0?tga4sess:tsess;
    const useSessDays=ga4Days>0?ga4Days:sessDays;
    const sessSource=ga4Days>0?"ga4":"manual";
    return {d:data.length,tr,to,ti,ts,te,tms,tmp,tmv,tsess,sessDays,
      tga4sess,tga4conv,ga4Days,sessSource,
      aov:to>0?tr/to:0,mer:tr>0&&tms>0?(tms/tr)*100:null,
      avgRev:tr/data.length,avgOrd:to/data.length,
      shipPct:tr>0?(ts/tr)*100:0,emailPct:tr>0?(te/tr)*100:null,
      metaROAS:tms>0?tmv/tms:null,cpp:tmp>0?tms/tmp:null,
      cr:useSess>0?(to/useSess)*100:null,rps:useSess>0?tr/useSess:null,
      useSess,useSessDays,
      startDate:data[0]?.d,endDate:data[data.length-1]?.d,
    };

  const agg=useMemo(()=>computeAgg(vis),[vis,sessData]);
  const prevAgg=useMemo(()=>computeAgg(prevVis),[prevVis,sessData]);

  // Change indicator helper
  const pctChange=(curr,prev)=>{

  const monthly=useMemo(()=>{

      m[k].rev+=d.r;m[k].ord+=d.o;m[k].meta+=d.ms;m[k].email+=d.e;m[k].ship+=d.s;m[k].items+=d.i;m[k].mp+=d.mp;m[k].mv+=d.mv;
    });
    return Object.entries(m).sort().map(([k,v])=>({
      month:k.slice(2),rev:Math.round(v.rev),meta:Math.round(v.meta),

  const PIES=[
    {name:"DTC",value:xeroChannels.dtc,color:"#2563eb"},
    {name:"Wholesale",value:xeroChannels.wh,color:"#7c3aed"},
    {name:"International",value:xeroChannels.intl,color:"#06b6d4"},
  ];

  // Channel data computed in Equation tab IIFE

  return <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--t1)",fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    

    <div style={{padding:"18px 24px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--acc),#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"var(--t1)"}}>Σ</div>
        <div><div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em",color:"var(--t1)"}}>NOODY SKINCARE</div>

        <Tab a={tab==="meta"} onClick={()=>setTab("meta")} icon="📢">Meta Ads</Tab>

      <span style={{fontSize:10,color:"var(--t3)",marginLeft:"auto"}}>{vis.length} days{agg?" · "+agg.startDate+" → "+agg.endDate:""} · {(shopLive?"Shopify ✓ ":"")+(metaLive?"Meta ✓ ":"")+(klavLive?"Klaviyo ✓ ":"")+(gads?"Google ✓ ":"")+(xeroLive?"Xero ✓":"")}</span>
    </div>}

    <div style={{padding:"24px 28px",maxWidth:1400,margin:"0 auto"}}>

    {tab==="equation"&&(()=>{
      if(!agg)return <div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>Loading data...</div>;

      // All metrics from selected range
      const a=agg; const p=prevAgg;
      const dtcRev=a.tr;
      const metaSpend=a.tms;
      const orders=a.to;

      const dtcRatio=xeroChannels.dtc/xeroChannels.rev;
      const whRatio=xeroChannels.wh/xeroChannels.rev;
      const intlRatio=xeroChannels.intl/xeroChannels.rev;
      const estTotalRev=dtcRatio>0?dtcRev/dtcRatio:dtcRev;
      const estWholesale=estTotalRev*whRatio;
      const estIntl=estTotalRev*intlRatio;
      const varRatio=XERO_VAR/XERO.rev;
      const fixedMonthly=XERO_FIXED/XERO.months;
      const estVariable=estTotalRev*varRatio;
      const estFixed=fixedMonthly*(days/30);
      const estProfit=estTotalRev-estVariable-metaSpend-estFixed;
      const estVarPct=estTotalRev>0?estVariable/estTotalRev*100:0;
      const estMerPct=estTotalRev>0?metaSpend/estTotalRev*100:0;
      const estDtcMer=dtcRev>0?metaSpend/dtcRev*100:0;
      const estFcPct=estTotalRev>0?estFixed/estTotalRev*100:0;
      const estProfPct=estTotalRev>0?estProfit/estTotalRev*100:0;
      const ler=(estTotalRev-estVariable)/(XERO.wages/XERO.months*(days/30));
      const contribMargin=estTotalRev>0?(estTotalRev-estVariable)/estTotalRev*100:0;
      const contribMarginDTC=dtcRev>0?(dtcRev-dtcRev*varRatio)/dtcRev*100:0;
      // LTGP:CAC estimate (LTV ~ 2x AOV for skincare, gross margin from contrib margin, CAC = ad spend / new customers)
      const estLTV=aov*2;const estGrossMargin=contribMarginDTC/100;const estCAC=orders>0?metaSpend/orders:0;
      const ltgpCac=estCAC>0?(estLTV*estGrossMargin)/estCAC:null;

      // Previous period

      const pRoas=p?p.metaROAS:null;

      // Change arrow component
      const Chg=({curr,prev,inv,fmt:f})=>{
        const ch=pctChange(curr,prev);

        const good=inv?ch<0:ch>0;

        const arrow=ch>0?"\u25B2":ch<0?"\u25BC":"\u2014";

      // Source tag

      // Situation

      else if(estProfPct<10||estDtcMer>45||estFcPct>25){situation=2;sitLabel="PROFITABLE \u2014 CONSTRAINED";sitColor="var(--ylw)";}

      return <>

      <div style={{background:sitColor+"11",border:"1px solid "+sitColor+"33",borderRadius:14,padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontSize:28,fontWeight:700,color:sitColor,fontFamily:"'JetBrains Mono',monospace",minWidth:80,textAlign:"center"}}>S{situation}</div>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:sitColor}}>{sitLabel}</div>
          <div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>
            {situation===1?"Equation is healthy. Focus on SCALING.":
             situation===2?"Profitable but constrained. DTC MER "+fp(estDtcMer)+", Fixed "+fp(estFcPct)+".":

          <div style={{fontSize:10,color:"var(--t3)"}}>est. net profit</div>

        <TargetBar label="AOV" current={aov} target={TARGETS.aov} fmt="$"/>
        {emailPct!=null&&<TargetBar label="Email Rev %" current={emailPct} target={TARGETS.emailPct} fmt="%"/>}
        <TargetBar label="Meta ROAS" current={roas||0} target={TARGETS.metaROAS} fmt="x"/>
      </div>

      {/* DTC LIVE PERFORMANCE */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--t1)"}}>DTC Performance \u2014 {days} Days</h2>
          <Src s="SHOPIFY + META \u00B7 LIVE"/>
        </div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:10}}>Online store only. {agg.startDate} \u2192 {agg.endDate}{prevAgg?" \u00B7 vs prior "+prevAgg.d+"d ("+prevAgg.startDate+" \u2192 "+prevAgg.endDate+")":""}</div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
          {[
            {l:"DTC Revenue",v:dtcRev,pv:pDtcRev,f:"$",fmt:"$"},
            {l:"Orders",v:orders,pv:pOrders,f:"n"},

            {l:"DTC MER",v:mer,pv:pMer,f:"%",bm:BM.mer,inv:true,sub:"benchmark <35%"},

            <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>DAILY MER</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={chartData}><CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
                <XAxis dataKey="d" tick={{fill:"#6b7280",fontSize:10}} interval={Math.max(0,Math.floor(chartData.length/8))}/>
                <YAxis tick={{fill:"#6b7280",fontSize:9}}/>
                <Tooltip contentStyle={{background:"var(--bdr)",border:"1px solid #2d2d44",borderRadius:8,fontSize:11}}/>
                <Line type="monotone" dataKey="mer" stroke="#a855f7" strokeWidth={2} dot={false}/>

          <div>
            <div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>Session Data</div>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <button onClick={()=>{
              const ta=document.getElementById("sess-paste");
              if(!ta||!ta.value.trim())return;
              const lines=ta.value.trim().split("\n");
              const updated={...sessData};let count=0;
              lines.forEach(line=>{
                const parts=line.split(",").map(s=>s.trim());
                if(parts.length>=2){
                  const date=parts[0];const sess=parseInt(parts[1]);
                  if(date.match(/^\d{4}-\d{2}-\d{2}$/)&&sess>0){updated[date]=sess;count++;}
                }
              });
              if(count>0){saveSess(updated);ta.value="";alert("Saved "+count+" days of session data");}
            }} style={{padding:"10px 16px",fontSize:12,borderRadius:8,cursor:"pointer",background:"var(--acc)",color:"#fff",border:"none",fontWeight:600}}>Save Sessions</button>
            <button onClick={()=>{
              const today=new Date().toISOString().split("T")[0];
              const sess=prompt("Sessions for "+today+":");
              if(sess&&parseInt(sess)>0){const updated={...sessData};updated[today]=parseInt(sess);saveSess(updated);}
            }} style={{padding:"10px 16px",fontSize:12,borderRadius:8,cursor:"pointer",background:"var(--card)",color:"var(--t2)",border:"1px solid var(--bdr)"}}>Quick Add Today</button>
          </div>
        </div>
        {agg.tsess>0&&<div style={{fontSize:12,color:"var(--t2)",padding:"8px 12px",background:"rgba(79,110,247,0.06)",borderRadius:8}}>
          {fn(agg.tsess)} sessions across {agg.sessDays} days = <strong style={{color:"var(--acc)"}}>{agg.cr.toFixed(2)}% CR</strong> ({fn(agg.to)} orders) · <strong>{f$(agg.rps)}/session</strong> · Avg {fn(Math.round(agg.tsess/agg.sessDays))}/day
        </div>}
        {agg.cr!=null&&agg.cr>0&&<div style={{fontSize:11,color:"var(--t3)",marginTop:8}}>
          Revenue change diagnosis: {agg.cr<1.5?"LOW CONVERSION — fix site experience/offers":agg.tsess/agg.sessDays<80?"LOW TRAFFIC — increase ad spend or organic":agg.aov<60?"LOW AOV — add bundles/upsells":"Balanced — monitor all three levers"}
        </div>}
      </div>

      {/* WHOLESALE TRACKER */}
      <div style={{background:"linear-gradient(135deg,rgba(124,58,237,0.06),rgba(37,99,235,0.04))",border:"1px solid rgba(124,58,237,0.2)",borderRadius:14,padding:18,marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>Wholesale Tracker</div>
            <div style={{fontSize:11,color:"var(--t3)"}}>~45% of revenue ({f$(XERO.wh)}/yr) with zero dashboard visibility. Track monthly.</div>
          </div>
          <button onClick={()=>{
            const mo=prompt("Month (YYYY-MM):",new Date().toISOString().slice(0,7));
            if(!mo||!mo.match(/^\d{4}-\d{2}$/))return;
            const rev=prompt("Wholesale revenue for "+mo+":",whData[mo]?.rev||"");
            const accts=prompt("Active accounts:",whData[mo]?.accts||"");
            const notes=prompt("Notes:",whData[mo]?.notes||"");
            if(rev!=null){
              const updated={...whData};
              updated[mo]={rev:parseFloat(rev)||0,accts:parseInt(accts)||0,notes:notes||""};
              saveWh(updated);
            }
          }} style={{padding:"8px 16px",fontSize:12,borderRadius:8,cursor:"pointer",background:"#7c3aed",color:"#fff",border:"none",fontWeight:600}}>+ Add Month</button>

        {(()=>{
          const months=Object.entries(whData).sort((a,b)=>b[0].localeCompare(a[0]));

          const totalRev=months.reduce((s,m)=>s+(m[1].rev||0),0);
          const avgRev=months.length?totalRev/months.length:0;
          return <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:7,marginBottom:10}}>
              <MC l="Total Tracked" v={totalRev} fmt="$"/>
              <MC l="Avg/Month" v={avgRev} fmt="$"/>
              <MC l="Months" v={months.length} fmt="n"/>
              <MC l="Xero Annual" v={XERO.wh} fmt="$" sub={f$(Math.round(XERO.wh/12))+"/mo"}/>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
                <thead><tr style={{borderBottom:"1px solid var(--bdr)"}}>
                  {["Month","Revenue","Accounts","vs Xero Avg","Notes",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}
                </tr></thead>
                <tbody>{months.map(([mo,d])=>{
                  const xAvg=XERO.wh/12;const pct=xAvg>0?Math.round(d.rev/xAvg*100):0;
                  return <tr key={mo} style={{borderBottom:"1px solid var(--bg)"}}>
                    <td style={{padding:"6px 8px",color:"var(--t2)"}}>{mo}</td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{f$(d.rev)}</td>
                    <td style={{padding:"6px 8px"}}>{d.accts||"—"}</td>
                    <td style={{padding:"6px 8px",color:pct>=100?"var(--grn)":pct>=80?"var(--ylw)":"var(--red)"}}>{pct}%</td>
                    <td style={{padding:"6px 8px",color:"var(--t3)",fontSize:11,fontFamily:"'DM Sans',sans-serif",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.notes||""}</td>
                    <td style={{padding:"6px 8px"}}><button onClick={()=>{
                      const updated={...whData};delete updated[mo];saveWh(updated);
                    }} style={{fontSize:10,color:"var(--red)",background:"none",border:"none",cursor:"pointer"}}>x</button></td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          </>;
        })()}
      </div>

    </>;
    })()}

    {tab==="meta"&&(()=>{
      if(!agg)return null;
      const _days=agg.d;const _mo=Math.max(_days/30,1);
      const _metaAiKey="meta_"+rangeKey;
      if(!tabAi[_metaAiKey]&&!tabAiLoading.meta){
        const cpData=campaignData?(campaignData.data||campaignData.campaigns||[]):[];
        const _p="Analyse this Meta Ads account using the Ecommerce Equation framework. Use Marvel Math terminology (Superhero/Hero/Sidekick/Civilian/Villain). Reference Traffic Light System benchmarks for frequency. Give: situation assessment, campaign health, funnel allocation check, and 2-3 specific actions.\n\nPeriod: "+agg.startDate+" to "+agg.endDate+" ("+_days+"d)\nMeta Spend: $"+fn(agg.tms)+"\nPurchases: "+fn(agg.tmp)+"\nCPP: $"+Math.round(agg.cpp||0)+"\nROAS: "+(agg.metaROAS?agg.metaROAS.toFixed(2):"—")+"x (target: "+TARGETS.metaROAS+"x)\nMER: "+(agg.mer?agg.mer.toFixed(1):"—")+"%\nDTC Revenue: $"+fn(agg.tr)+(prevAgg?"\n\nPrior period: Spend $"+fn(prevAgg.tms)+", ROAS "+(prevAgg.metaROAS?prevAgg.metaROAS.toFixed(2):"—")+"x, CPP $"+Math.round(prevAgg.cpp||0):"")+(cpData.length?"\n\nCampaigns:\n"+cpData.map(c=>c.campaign_name+": spend=$"+Math.round(c.spend||0)+", cpp=$"+Math.round(c.cpp||0)+", roas="+(c.roas||0).toFixed(2)+"x, freq="+(c.frequency||0).toFixed(2)+", purchases="+(c.purchases||0)+", reach="+(c.reach||0)).join("\n"):"");
        setTimeout(()=>fetchTabAi("meta",_p,["meta"]),0);
      }

      /* Campaign data */
      const cData=(campaignData?.data||campaignData?.campaigns||[]).filter(c=>c.spend>0);
      const totalCSpend=cData.reduce((s,c)=>s+(c.spend||0),0);

      /* Funnel detection */
      const _funnel=(n)=>{const s=(n||"").toLowerCase();if(s.includes("mof")||s.includes("retarget")||s.includes("remark")||s.includes("middle")||s.includes("bot"))return"MOF";if(s.includes("asc")||s.includes("advantage")||s.includes("shopping"))return"ASC";if(s.includes("tom")||s.includes("top of mid"))return"TOM";return"TOF";};
      const _freqBench={TOF:{g:2.0,w:2.5},TOM:{g:3.5,w:4.0},ASC:{g:2.0,w:2.5},MOF:{g:4.0,w:5.0}};

      /* Funnel spend totals */
      const _fs={TOF:0,ASC:0,MOF:0,TOM:0};
      const _fc={TOF:0,ASC:0,MOF:0,TOM:0};
      cData.forEach(c=>{const f=_funnel(c.campaign_name);_fs[f]=((_fs[f])||0)+(c.spend||0);_fc[f]=((_fc[f])||0)+1;});

      /* CPP trend from daily data */
      const _cppTrend=(vis||[]).filter(d=>d.ms>0&&d.mp>0).map(d=>({d:d.d.slice(5),spend:Math.round(d.ms),cpp:d.mp>0?Math.round(d.ms/d.mp):null}));

      return <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:20,fontWeight:700,margin:0}}>Meta Ads Performance</h2>
        <div style={{display:"flex",gap:8}}>
          {!campaignData&&!campaignLoading&&<button onClick={fetchCampaigns} style={{padding:"8px 16px",background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:8,color:"var(--t2)",fontSize:12,fontWeight:600,cursor:"pointer"}}>Load Campaigns</button>}
          {campaignLoading&&<span style={{fontSize:12,color:"var(--t3)"}}>⏳ Loading campaigns...</span>}
          <a href="/meta-coach.html" style={{padding:"8px 16px",background:"var(--acc,#c94f8a)",color:"#fff",borderRadius:8,textDecoration:"none",fontSize:12,fontWeight:600}}>Open Coach</a>
        </div>
      </div>

        <MC l={_days+"d Spend"} v={agg.tms||0} fmt="$" big/>
        <MC l="Purchases" v={agg.tmp||0} fmt="n"/>
        <MC l="Avg CPP" v={agg.cpp||0} fmt="$" bm={agg.cpp?{h:[0,agg.cpp*0.8],w:[agg.cpp*0.8,agg.cpp*1.5]}:null}/>
        <MC l="Meta ROAS" v={agg.metaROAS||0} fmt="n" bm={{h:[2.5,100],w:[1.5,2.5]}} sub="last-click"/>
        <MC l="True MER" v={agg.mer||0} fmt="%" bm={{h:[0,25],w:[25,35]}}/>
        <MC l="Daily Avg" v={agg.tms/_days} fmt="$"/>
      </div>

      {/* Targets */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:14,marginBottom:14}}>

        <TargetBar label="Meta ROAS" current={agg.metaROAS||0} target={TARGETS.metaROAS} fmt="x"/>
        <TargetBar label="Monthly Ad Spend" current={agg.tms/_mo} target={TARGETS.monthlyAdSpend} fmt="$" inv/>
      </div>

      {/* AI Analysis */}
      <AiSummary text={tabAi[_metaAiKey]} loading={tabAiLoading.meta} label={"AI Meta Analysis — "+_days+"d"}/>

      {/* Campaign Breakdown with Traffic Light */}
      {cData.length>0&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:14,fontWeight:600}}>Campaign Breakdown</div>
            <div style={{fontSize:11,color:"var(--t3)"}}>Traffic Light: frequency assessed per funnel stage</div>
          </div>
          <button onClick={fetchCampaigns} style={{padding:"4px 10px",background:"transparent",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--t3)",fontSize:10,cursor:"pointer"}}>🔄</button>

          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
            <thead><tr style={{borderBottom:"1px solid var(--bdr)"}}>
              {["Campaign","Funnel","Spend","CPP","Purch","ROAS","Freq","Reach","CTR","Health"].map(h=><th key={h} style={{padding:"8px 6px",textAlign:"left",color:"var(--t3)",fontWeight:500,fontSize:10,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
            </tr></thead>
            <tbody>{cData.sort((a,b)=>(b.spend||0)-(a.spend||0)).map((c,i)=>{
              const fun=_funnel(c.campaign_name);
              const fb=_freqBench[fun]||_freqBench.TOF;
              const fH=!c.frequency?"\u2014":c.frequency<=fb.g?"\uD83D\uDFE2":c.frequency<=fb.w?"\uD83D\uDFE1":"\uD83D\uDD34";
              const avgCpp=agg.cpp||30;
              const cppC=!c.cpp?"inherit":c.cpp<=avgCpp?"#10b981":c.cpp<=avgCpp*2?"#f59e0b":"#ef4444";
              const roasC=!c.roas?"inherit":c.roas>=3?"#10b981":c.roas>=2?"#f59e0b":"#ef4444";
              const freqC=!c.frequency?"inherit":c.frequency<=fb.g?"#10b981":c.frequency<=fb.w?"#f59e0b":"#ef4444";
              const funC=fun==="TOF"||fun==="ASC"?"#3b82f6":fun==="TOM"?"#a855f7":"#10b981";
              // Overall traffic light: Green=scale, Yellow=monitor, Red=pause
              var roasOk=c.roas&&c.roas>=TARGETS.metaROAS;
              var cppOk=c.cpp&&c.cpp<=avgCpp*1.5;
              var freqOk=c.frequency&&c.frequency<=fb.w;
              var tlScore=(roasOk?1:0)+(cppOk?1:0)+(freqOk?1:0);
              var tlLight=tlScore>=3?"\uD83D\uDFE2 Scale":tlScore>=2?"\uD83D\uDFE1 Monitor":c.purchases>0?"\uD83D\uDD34 Pause":"\u2014";
              var tlColor=tlScore>=3?"#10b981":tlScore>=2?"#f59e0b":"#ef4444";
              return <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>

                <td style={{padding:"8px 6px",color:cppC}}>{c.cpp?"$"+Math.round(c.cpp):"\u2014"}</td>
                <td style={{padding:"8px 6px"}}>{c.purchases||0}</td>
                <td style={{padding:"8px 6px",color:roasC}}>{c.roas?(c.roas).toFixed(2)+"x":"\u2014"}</td>
                <td style={{padding:"8px 6px",color:freqC}}>{c.frequency?c.frequency.toFixed(2):"\u2014"}</td>

                <td style={{padding:"8px 6px",color:"var(--t2)"}}>{c.ctr?c.ctr.toFixed(2)+"%":"\u2014"}</td>
                <td style={{padding:"8px 6px",textAlign:"center",fontSize:10,color:tlColor,fontWeight:600,whiteSpace:"nowrap"}}>{tlLight}</td>
              </tr>;

          </table>
        </div>
      </div>}

      {/* Funnel Spend Allocation */}
      {cData.length>0&&totalCSpend>0&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Funnel Spend Allocation</div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:12}}>Actual vs EE framework target (TOF+TOM 45% / ASC 35% / MOF 20%)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
          {[["TOF","#3b82f6",45],["ASC","#a855f7",35],["MOF","#10b981",20]].map(([label,col,ideal])=>{
            const spent=(label==="TOF"?(_fs.TOF||0)+(_fs.TOM||0):(_fs[label]||0));
            const cnt=(label==="TOF"?(_fc.TOF||0)+(_fc.TOM||0):(_fc[label]||0));
            const actual=totalCSpend>0?spent/totalCSpend*100:0;
            const diff=actual-ideal;
            const ok=Math.abs(diff)<10;
            return <div key={label} style={{background:"rgba(255,255,255,0.03)",border:"1px solid var(--bdr)",borderRadius:10,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{color:col,fontWeight:700,fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>{label}</span>
                <span style={{fontSize:10,color:ok?"#10b981":"#f59e0b"}}>{ok?"✓":"⚠"} {diff>0?"+":""}{diff.toFixed(0)}pp</span>
              </div>
              <div style={{height:8,background:"rgba(255,255,255,0.06)",borderRadius:4,marginBottom:4,position:"relative"}}>
                <div style={{height:"100%",width:Math.min(actual,100)+"%",background:col,borderRadius:4,transition:"width .5s"}}/>
                <div style={{position:"absolute",left:ideal+"%",top:-2,bottom:-2,width:2,background:"var(--t3)"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                <span>{actual.toFixed(0)}% actual</span>
                <span style={{color:"var(--t3)"}}>{ideal}% target</span>
              </div>
              <div style={{fontSize:10,color:"var(--t3)",marginTop:3}}>{cnt} campaign{cnt!==1?"s":""} · ${fn(Math.round(spent))}</div>
            </div>;
          })}

      {/* Daily CPP Trend */}
      {_cppTrend.length>3&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:10}}>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>DAILY META SPEND & CPP TREND</div>
        <ResponsiveContainer width="100%" height={180}>
          <ComposedChart data={_cppTrend}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
            <XAxis dataKey="d" tick={{fill:"#6b7280",fontSize:9}}/>

         ]},

        {type:vcPct<=40?"opportunity":"warning",icon:vcPct<=40?"✅":"⚠️",title:"Variable Costs at "+vcPct.toFixed(1)+"% — "+(vcPct<=40?"Healthy, Room to Fine-Tune":"Above 40% Benchmark"),
         body:"Variable costs are <strong>"+(vcPct<=40?"below":"above")+" the 40% benchmark</strong>. Product margins are "+(vcPct<=40?"solid, giving room to absorb some marketing inefficiency":"tight — needs attention")+". COGS at "+fp(XERO.cogs/XERO.rev*100)+", shipping at "+fp(XERO.postage/XERO.rev*100)+", packaging at "+fp(XERO.pkg/XERO.rev*100)+" (Xero ratios). Minor optimisation: negotiate courier rates at your volume, and review Afterpay merchant fees.",
         actions:[
           {week:"This Month",text:"Review courier contract — at your shipment volume, negotiate rates or test NZ Post vs CourierPost."},
         ]},

        {type:npPct>=10?"opportunity":npPct>=5?"warning":"critical",icon:"🎯",title:"Situation "+situation+": "+(npPct>=10?"Profitable":npPct>=0?"Near Breakeven":"Unprofitable")+" at "+npPct.toFixed(1)+"% — "+(npPct>=10?"Scale":"Fix")+" Roadmap",
         body:"You're in <strong>Situation "+situation+"</strong>. The playbook: Calibrate → Scale → Optimise. Profit margin of "+npPct.toFixed(1)+"% is "+(npPct>=10?"above the 10% minimum":"below target")+". "+(dtcMerVal>35||fcPct>20?"<strong>DTC MER at "+dtcMerVal.toFixed(1)+"%</strong> and <strong>fixed costs at "+fcPct.toFixed(1)+"%</strong> mean you need revenue growth more than cost cutting.":"")+" The EE framework says: when profitable with high fixed %, the answer is almost always SCALE — grow revenue to leverage the fixed cost base. LER at "+ler.toFixed(2)+" "+(ler>=2?"confirms wages are generating sufficient gross margin":"needs improvement")+".",
         actions:[
           {week:"Week 1: Calibrate",text:"Lock in all EE inputs with live data. Verify Xero P&L matches tracking. Set 90-day targets."},
           {week:"Week 2: Stabilise Email",text:"Get email revenue floor above 25% of DTC revenue. Activate all automated flows."},
           {week:"Week 3: AOV Push",text:"Launch bundle strategy and cart upsell. Target AOV $"+Math.round(currentAOV)+" → $"+(Math.round(currentAOV)+15)+"."},
           {week:"Week 4: Scale Test",text:"Increase Meta spend by 15% on top 3 campaigns. Monitor weekly — if DTC MER doesn't worsen, continue."},
         ]},
      ];

      const critCount=insights.filter(i=>i.type==="critical").length;
      const warnCount=insights.filter(i=>i.type==="warning").length;
      const oppCount=insights.filter(i=>i.type==="opportunity").length;
      const infoCount=insights.filter(i=>i.type==="info").length;
      const totalActions=insights.reduce((a,ins)=>a+(ins.actions?ins.actions.length:0),0);
      const typeColors={critical:"var(--red)",warning:"var(--ylw)",opportunity:"var(--grn)",info:"var(--acc)"};
      const typeBg={critical:"rgba(239,68,68,0.06)",warning:"rgba(245,158,11,0.06)",opportunity:"rgba(16,185,129,0.06)",info:"rgba(79,110,247,0.06)"};
      const typeBdr={critical:"rgba(239,68,68,0.25)",warning:"rgba(245,158,11,0.25)",opportunity:"rgba(16,185,129,0.25)",info:"rgba(79,110,247,0.25)"};

      return <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:700,margin:0,color:"#a78bfa"}}>✦ Strategic Insights — {days} Days</h2>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>Auto-generated from {a.startDate} → {a.endDate} × Ecommerce Equation benchmarks</div>
          </div>
          <div style={{fontSize:10,color:"var(--t3)"}}>{(shopLive?"Shopify ✓ ":"")+(metaLive?"Meta ✓ ":"")+(gads?"Google ✓ ":"")+(xeroLive?"Xero ✓":"")}</div>
        </div>

        {/* Summary pills */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:20}}>
          {[
            {n:critCount,l:"Critical",c:"var(--red)"},
            {n:warnCount,l:"Warnings",c:"var(--ylw)"},
            {n:oppCount,l:"Opportunities",c:"var(--grn)"},
            {n:infoCount,l:"Informational",c:"var(--acc)"},
            {n:totalActions,l:"Actions",c:"#a78bfa"},
          ].map((p,i)=><div key={i} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:700,color:p.c,fontFamily:"'JetBrains Mono',monospace"}}>{p.n}</div>
            <div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{p.l}</div>
          </div>)}
        </div>

        {/* 6-WEEK GAME PLAN */}
        {(()=>{
          // Determine which week Noody should be in
          var weekPhase="1-2",phaseLabel="CALIBRATE",phaseColor="#3b82f6",phaseDesc="Lock in data, verify tracking, identify situation and constraint.";
          if(situation===1&&dtcMerVal<=35&&fcPct<=25){weekPhase="5-6";phaseLabel="SCALE TEST";phaseColor="#10b981";phaseDesc="Equation is profitable. Increase ad spend 15-20% on top performers, test new creative.";}
          else if(npPct>=5){weekPhase="3-4";phaseLabel="QUICK WINS";phaseColor="#f59e0b";phaseDesc="Fix obvious gaps \u2014 activate flows, optimize form, increase campaign cadence, pause villain ads.";}
          return <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:16}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>EE 6-Week Game Plan \u2014 Where Is Noody?</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {[
                {w:"1-2",l:"Calibrate",d:"Lock in data, verify tracking, set benchmarks",c:"#3b82f6"},
                {w:"3-4",l:"Quick Wins",d:"Fix flows, form, campaign cadence, pause bad ads",c:"#f59e0b"},
                {w:"5-6",l:"Scale Test",d:"Increase spend 15% if profitable, test new creative",c:"#10b981"},
              ].map((phase,i)=>{
                var isActive=phase.w===weekPhase;
                return <div key={i} style={{background:isActive?phase.c+"14":"transparent",border:"1px solid "+(isActive?phase.c+"4d":"var(--bdr)"),borderRadius:10,padding:12,textAlign:"center",opacity:isActive?1:0.5}}>
                  <div style={{fontSize:10,color:"var(--t3)"}}>WEEK {phase.w}</div>
                  <div style={{fontSize:14,fontWeight:700,color:isActive?phase.c:"var(--t2)",marginTop:2}}>{phase.l}</div>
                  <div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>{phase.d}</div>
                  {isActive&&<div style={{fontSize:10,fontWeight:600,color:phase.c,marginTop:6}}>👈 CURRENT PHASE</div>}
                </div>;
              })}
            </div>
            <div style={{marginTop:10,padding:12,background:phaseColor+"0a",border:"1px solid "+phaseColor+"33",borderRadius:8}}>
              <div style={{fontSize:12,fontWeight:600,color:phaseColor}}>Week {weekPhase}: {phaseLabel}</div>
              <div style={{fontSize:11,color:"var(--t2)",marginTop:4}}>{phaseDesc}</div>
            </div>
          </div>;
        })()}

        {/* Insight cards */}
        {insights.map((ins,idx)=><div key={idx} style={{
          background:typeBg[ins.type],
          border:"1px solid "+typeBdr[ins.type],
          borderLeft:"4px solid "+typeColors[ins.type],
          borderRadius:12,padding:20,marginBottom:12
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:20}}>{ins.icon}</span>
            <div style={{fontSize:15,fontWeight:600,color:"var(--t1)"}}>{ins.title}</div>
          </div>
          <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:ins.body}}/>
          {ins.actions&&ins.actions.map((a,ai)=><div key={ai} style={{
            marginTop:ai===0?12:6,padding:"10px 14px",
            background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",
            borderLeft:"3px solid #a78bfa",borderRadius:"0 8px 8px 0"
          }}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:"#a78bfa",marginBottom:3}}>↳ {a.week}</div>
            <div style={{fontSize:12,color:"var(--t1)"}}>{a.text}</div>
          </div>)}
        </div>)}

        {/* Monthly ROAS trend */}
        {monthlyRoas.length>2&&<div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18,marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:8,textTransform:"uppercase"}}>Meta ROAS by Month</div>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={monthlyRoas}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
              <XAxis dataKey="month" tick={{fill:"#6b7280",fontSize:9}}/>
              <YAxis yAxisId="roas" tick={{fill:"#6b7280",fontSize:9}} domain={[0,"auto"]}/>
              <YAxis yAxisId="spend" orientation="right" tick={{fill:"#6b7280",fontSize:9}}/>
              <Tooltip contentStyle={{background:"var(--bdr)",border:"1px solid #2d2d44",borderRadius:8,fontSize:11}}/>
              <Bar yAxisId="spend" dataKey="spend" fill="#a855f722" radius={[3,3,0,0]} name="Meta Spend ($)"/>
              <Line yAxisId="roas" type="monotone" dataKey="roas" stroke="#10b981" strokeWidth={2} dot={{r:3}} name="ROAS"/>
              <ReferenceLine yAxisId="roas" y={2.5} stroke="#f59e0b66" strokeDasharray="3 3" label={{value:"2.5x target",fill:"#f59e0b",fontSize:9}}/>
            </ComposedChart>
          </ResponsiveContainer>
          {bestMonth&&worstMonth&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
            <div style={{background:"rgba(16,185,129,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>BEST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#10b981",fontFamily:"'JetBrains Mono',monospace"}}>{bestMonth.month} — {bestMonth.roas}x</div>
            </div>
            <div style={{background:"rgba(239,68,68,0.06)",borderRadius:8,padding:10,textAlign:"center"}}>
              <div style={{fontSize:10,color:"var(--t3)"}}>WORST MONTH</div>
              <div style={{fontSize:16,fontWeight:700,color:"#ef4444",fontFamily:"'JetBrains Mono',monospace"}}>{worstMonth.month} — {worstMonth.roas}x</div>
            </div>
          </div>}
        </div>}

        {/* Quick reference benchmarks */}
        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:18}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:10,textTransform:"uppercase"}}>Ecommerce Equation Benchmarks vs Actuals</div>
          <div style={{display:"grid",gap:8}}>
            {[
              {l:"Variable Costs",actual:vcPct,target:"< 40%",status:vcPct<=40?"h":vcPct<=50?"w":"c"},
              {l:"MER (Blended)",actual:merPct,target:"< 35%",status:merPct<=35?"h":merPct<=45?"w":"c"},
              {l:"MER (DTC-Only)",actual:dtcMerVal,target:"< 35%",status:dtcMerVal<=35?"h":dtcMerVal<=45?"w":"c"},
              {l:"Fixed Costs",actual:fcPct,target:"< 20%",status:fcPct<=20?"h":fcPct<=30?"w":"c"},
              {l:"Net Profit",actual:npPct,target:"> 10%",status:npPct>=10?"h":npPct>=5?"w":"c"},
              {l:"Email Rev %",actual:emailAvg,target:"30–40%",status:emailAvg>=30&&emailAvg<=40?"h":emailAvg>=15?"w":"c"},
              {l:"LER",actual:ler,target:"> $2.00",status:ler>=2?"h":ler>=1.5?"w":"c",fmt:"$"},
            ].map((b,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<6?"1px solid var(--bdr)":"none"}}>
              <span style={{fontSize:13,color:"var(--t2)"}}>{b.l}</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:9,color:"var(--t3)"}}>{b.target}</span>
                <span style={{fontSize:14,fontWeight:700,color:SC[b.status],fontFamily:"'JetBrains Mono',monospace"}}>{b.fmt==="$"?b.actual.toFixed(2):fp(b.actual)}</span>
                <span style={{fontSize:12}}>{b.status==="h"?"✅":b.status==="w"?"⚠️":"🔴"}</span>
              </div>
            </div>)}
          </div>
        </div>
      </>;
    })()}

    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script>
</body>
</html>
