<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// --- AUTH ---
const AUTH_HASH="a79f6ebca16b6b22e3fa7f1677375e9a735dae50774a88955182ce5ab8f71924";
const AUTH_KEY="noody_auth";
async function hashPw(pw){const enc=new TextEncoder().encode(pw);const buf=await crypto.subtle.digest("SHA-256",enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}
function LoginScreen({onAuth}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const [checking,setChecking]=useState(false);
  const handleSubmit=async(e)=>{
    e.preventDefault();setChecking(true);setErr(false);
    const h=await hashPw(pw);
    if(h===AUTH_HASH){sessionStorage.setItem(AUTH_KEY,"1");onAuth();}
    else{setErr(true);setChecking(false);}
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:16,padding:40,width:360,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.1)"}}>
      <div style={{fontSize:32,marginBottom:8}}>&#x1F510;</div>
      <h1 style={{fontSize:20,fontWeight:700,color:"var(--t1)",marginBottom:4}}>Meta Ads Coach</h1>
      <p style={{fontSize:13,color:"var(--t3)",marginBottom:24}}>Enter password to access</p>
      <form onSubmit={handleSubmit}>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" autoFocus
          style={{width:"100%",padding:"12px 16px",fontSize:15,border:"1px solid "+(err?"var(--red)":"var(--bdr)"),borderRadius:10,marginBottom:12,fontFamily:"'JetBrains Mono',monospace",outline:"none",background:err?"rgba(185,28,28,0.04)":"var(--bg)",color:"var(--t1)"}}/>
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:10}}>Incorrect password</div>}
        <button type="submit" disabled={checking||!pw} style={{width:"100%",padding:"12px",fontSize:15,fontWeight:600,borderRadius:10,border:"none",background:checking?"var(--bdr)":"var(--acc)",color:"#fff",cursor:checking?"wait":"pointer",opacity:checking?0.6:1}}>
          {checking?"Checking...":"Sign In"}
        </button>
      </form>
    </div>
  </div>;
}

const API_KEY="noody-eq-2026-datahub";
const FUNNEL={TOF:0.45,ASC:0.35,MOF:0.20};
const BRACKETS=[
  {label:"< $500",max:500,tof:1,asc:1,mof:1},
  {label:"$500-$1k",max:1000,tof:2,asc:2,mof:1},
  {label:"$1k-$3k",max:3000,tof:3,asc:2,mof:1},
  {label:"> $3k",max:Infinity,tof:4,asc:3,mof:2},
];
const FREQ_BM={green:1.0,yellow:2.0,red:3.0};
const AUDIENCES=[
  {id:"001",name:"Website - All Visits - 180d",usage:"MOF"},
  {id:"002",name:"IG Engagement - All - 365d",usage:"MOF"},
  {id:"003",name:"FB Engagement - All - 365d",usage:"MOF"},

  {id:"012",name:"FB Engagement - 7d",usage:"Exclusion"},
  {id:"013",name:"FB Engagement - 14d",usage:"Exclusion"},
  {id:"014",name:"FB Engagement - 30d",usage:"Exclusion"},
  {id:"015",name:"Website - Purchase - 180d",usage:"Lookalike"},
  {id:"016",name:"Website - ATC - 180d",usage:"Lookalike"},
  {id:"017",name:"Video - 95% Views - 365d",usage:"Lookalike"},
  {id:"018",name:"IG - Visited Page - 365d",usage:"Lookalike"},
  {id:"019",name:"IG - Saved Post - 365d",usage:"Lookalike"},
  {id:"020",name:"FB - Like & Follow - 365d",usage:"Lookalike"},
  {id:"021",name:"FB - Clicked CTA - 365d",usage:"Lookalike"},
];

// Meta ads context (from context/meta-ads.md)
const META_CONTEXT = `# Meta Ads \u2014 Noody Skincare Context
## Business Context
- Noody Skincare: NZ-based children's skincare brand
- DTC is ~41% of revenue ($383K/yr), wholesale 45%, international 14%
- Meta is the primary paid acquisition channel (80%+ of ad budget)
## Creative Testing Framework
- Always have 3-5 active creative tests running
- Test structure: 1 hero creative + 2-3 variants (different hooks, formats)
- Best performers historically: UGC testimonials from NZ parents, before/after skin results, product-in-use lifestyle shots
- Video outperforms static 2:1 on average
- Winning hook patterns: problem-first ("Is your child's skin..."), social proof ("10,000+ NZ families trust...")
## Advantage+ Settings
- Use Advantage+ Shopping campaigns for broad prospecting
- Advantage+ Audience for retargeting
- Minimum 7-day attribution window for children's skincare (longer consideration cycle)
- Exclude existing customers from prospecting campaigns
## Audience Notes
- Core audience: NZ parents/caregivers of children 0-12
- Key interests: natural skincare, eczema, sensitive skin, parenting
- Lookalike audiences based on purchasers perform best
- Geographic focus: NZ primary, AU secondary
## Benchmarks (What Good Looks Like for Noody)
- ROAS target: >2.5x (last-click)
- CPP (Cost Per Purchase): <$25 ideal, <$35 acceptable
- DTC MER (Meta spend / DTC revenue): <35%
- CTR: >1.5% on prospecting, >2.5% on retargeting
- Frequency: <2.0 on prospecting, <4.0 on retargeting
## Historical Best Performers
- Black Friday/Cyber Monday: ROAS peaks at 5-8x with bundle offers
- Winter campaigns (Jun-Aug): Higher conversion due to eczema season
- July 2025 sale: $24K+ single day, ROAS >7x
- November 2025 BFCM: $45K+ single day peak
## Common Issues
- Platform concentration risk: 80%+ spend on Meta
- Summer months (Dec-Feb): Lower ROAS as skincare demand drops
- Creative fatigue: Refresh every 2-3 weeks
- Attribution: Meta over-reports by ~20-30% vs Shopify actual
## Strategic Notes
- DTC ads may create halo effect driving wholesale (Farmers) sales
- Consider: is the true value of Meta spend higher than DTC MER suggests?
- Diversification target: 70% Meta / 20% Google / 10% TikTok within 6 months`;

const f$=n=>n==null?"--":"$"+Math.round(n).toLocaleString();
const fn=n=>n==null?"--":Math.round(n).toLocaleString();
const fp=n=>n==null?"--":n.toFixed(1)+"%";
const fRound=(n,d)=>n==null?"--":(Math.round(n*Math.pow(10,d))/Math.pow(10,d)).toFixed(d);

// ---- Utility Components ----
function Badge({color,children}){
  const bg=color==="var(--grn)"?"var(--grnbg)":color==="var(--ylw)"?"var(--ylwbg)":color==="var(--red)"?"var(--redbg)":"var(--blubg)";
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:"0.03em",textTransform:"uppercase",color:color,background:bg,border:"1px solid "+color+"22"}}>{children}</span>;
}

function Card({children,style,glow}){
  return <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:14,padding:24,boxShadow:glow?"0 0 40px var(--accbg)":"none",transition:"all .3s",...style}}>{children}</div>;
}

function Pill({active,onClick,children}){
  return <button onClick={onClick} style={{padding:"8px 18px",borderRadius:8,border:"1px solid "+(active?"var(--acc)":"var(--bdr)"),background:active?"var(--accbg)":"transparent",color:active?"var(--acc2)":"var(--t3)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>{children}</button>;
}

function Input({label,value,onChange,prefix,suffix,type,min,max,step,small}){
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:11,color:"var(--t3)",fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</label>}
    <div style={{position:"relative",display:"flex",alignItems:"center"}}>
      {prefix&&<span style={{position:"absolute",left:10,color:"var(--t3)",fontSize:13,pointerEvents:"none"}}>{prefix}</span>}
      <input type={type||"text"} value={value} onChange={e=>onChange(e.target.value)} min={min} max={max} step={step}
        style={{width:"100%",padding:small?"7px 10px":"10px 14px",paddingLeft:prefix?24:undefined,paddingRight:suffix?30:undefined,background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:8,color:"var(--t1)",fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}/>
      {suffix&&<span style={{position:"absolute",right:10,color:"var(--t3)",fontSize:13,pointerEvents:"none"}}>{suffix}</span>}
    </div>
  </div>;
}

function SortHeader({label,sortKey,currentSort,onSort,align}){
  const active=currentSort.key===sortKey;
  const arrow=active?(currentSort.dir==="desc"?" \u25BC":" \u25B2"):"";
  return <th onClick={()=>onSort(sortKey)} style={{padding:"10px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em",color:active?"var(--acc2)":"var(--t3)",fontWeight:600,cursor:"pointer",textAlign:align||"left",whiteSpace:"nowrap",userSelect:"none",borderBottom:"1px solid var(--bdr)"}}>{label}{arrow}</th>;
}

// ---- AI Coach (upgraded with context + Shopify MER) ----
function AICoach({metaData,adsetData,adData,shopifyData,days}){
  const [q,setQ]=useState("");
  const [resp,setResp]=useState("");
  const [loading,setLoading]=useState(false);
  const [history,setHistory]=useState([]);

  const buildContext=()=>{
    let ctx="\n\n--- NOODY META ADS CONTEXT ---\n"+META_CONTEXT;
    if(metaData?.summary){
      const s=metaData.summary;
      const dr=metaData.dateRange;
      const period=dr?(dr.start+" to "+dr.end):days+"d";
      ctx+="\n\n--- LIVE META ADS DATA ("+period+") ---";
      ctx+="\nTotal Spend: $"+fRound(s.totalSpend,2);
      ctx+="\nTotal Purchases (Meta-attributed): "+s.totalPurchases;
      ctx+="\nTotal Purchase Value (Meta-attributed): $"+fRound(s.totalPurchaseValue,2);
      ctx+="\nAvg CPP: $"+fRound(s.avgCPP,2);
      ctx+="\nROAS (Meta-attributed): "+fRound(s.roas,2)+"x";
    }
    if(shopifyData){
      ctx+="\n\n--- SHOPIFY DTC DATA (same period) ---";
      ctx+="\nDTC Revenue: $"+fRound(shopifyData.totalRevenue,2);
      ctx+="\nDTC Orders: "+shopifyData.totalOrders;
      ctx+="\nAOV: $"+fRound(shopifyData.aov,2);
      if(metaData?.summary?.totalSpend && shopifyData.totalRevenue>0){
        const mer=(metaData.summary.totalSpend/shopifyData.totalRevenue*100);
        ctx+="\nTrue DTC MER (Meta spend / Shopify DTC revenue): "+fRound(mer,1)+"%";
        ctx+="\nBenchmark: DTC MER <35% is target";
        const trueCPP=metaData.summary.totalSpend/shopifyData.totalOrders;
        ctx+="\nTrue CPP (Meta spend / Shopify orders): $"+fRound(trueCPP,2);
      }
    }
    if(metaData?.data?.length>0){
      ctx+="\n\n--- CAMPAIGN BREAKDOWN ---";
      metaData.data.sort(function(a,b){return b.spend-a.spend;}).slice(0,15).forEach(function(c){
        ctx+="\n- "+c.campaign_name+": Spend $"+fRound(c.spend,0)+", Purchases "+c.purchases+", CPP $"+fRound(c.cpp,2)+", ROAS "+fRound(c.roas,2)+"x, Freq "+fRound(c.frequency,2)+", CTR "+fRound(c.ctr,2)+"%";
      });
    }
    if(adsetData?.data?.length>0){
      ctx+="\n\n--- TOP ADSETS ---";
      adsetData.data.sort(function(a,b){return b.spend-a.spend;}).slice(0,15).forEach(function(a){
        ctx+="\n- "+a.campaign_name+" > "+a.adset_name+": Spend $"+fRound(a.spend,0)+", Purchases "+a.purchases+", CPP $"+fRound(a.cpp,2)+", ROAS "+fRound(a.roas,2)+"x, Freq "+fRound(a.frequency,2);
      });
    }
    if(adData?.data?.length>0){
      ctx+="\n\n--- TOP ADS ---";
      adData.data.sort(function(a,b){return b.spend-a.spend;}).slice(0,20).forEach(function(a){
        ctx+="\n- "+a.ad_name+" ("+a.campaign_name+"): Spend $"+fRound(a.spend,0)+", Purchases "+a.purchases+", CPP $"+fRound(a.cpp,2)+", ROAS "+fRound(a.roas,2)+"x, Freq "+fRound(a.frequency,2)+", CTR "+fRound(a.ctr,2)+"%";
      });
    }
    return ctx;
  };

  const ask=async(prompt)=>{
    const question=prompt||q;
    if(!question.trim())return;
    setQ(question);
    setLoading(true);
    try{
      const r=await fetch("/api/ai-coach",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":API_KEY},body:JSON.stringify({prompt:question+buildContext(),context:["meta"],max_tokens:2000})});
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setResp(d.text);
      setHistory(p=>[...p,{role:"user",content:question},{role:"assistant",content:d.text}]);
    }catch(e){setResp("Error: "+e.message);}
    setLoading(false);setQ("");
  };

  const diagnosticPrompts=[
    {label:"Which campaigns should I pause?",prompt:"Analyse my campaign data and tell me specifically which campaigns I should pause and why. Consider CPP, ROAS, frequency, and spend. Be specific with campaign names and numbers."},
    {label:"Where should I increase budget?",prompt:"Based on my campaign, adset, and ad level data, where should I increase budget? Look for campaigns with low CPP, good ROAS, and low frequency that have room to scale. Be specific with names and recommended budget changes."},
    {label:"What's my creative fatigue situation?",prompt:"Analyse frequency across my campaigns, adsets, and ads. Which creatives are fatigued (frequency >2)? Which are still fresh? What's my overall creative health? Recommend specific actions."},
    {label:"How's my true MER vs Meta ROAS?",prompt:"Compare my Meta-attributed ROAS with my true DTC MER (Meta spend / Shopify revenue). Is Meta over-reporting? What does this mean for my actual profitability? What's the gap between Meta-claimed and reality?"},
    {label:"Find my hero ads",prompt:"Look at my ad-level data and identify hero ads (high ROAS, low CPP, good CTR, manageable frequency). Also identify underperformers to cut. Rank the top 5 best and worst ads with specific metrics."},
    {label:"Full diagnostic",prompt:"Give me a full Meta ads diagnostic: 1) Overall health (MER, ROAS, CPP trends), 2) Campaign structure assessment, 3) Creative fatigue check, 4) Top performers to scale, 5) Underperformers to pause, 6) One specific action I should take today. Use all available campaign, adset, and ad data."},
  ];

  return <Card glow>
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <span style={{fontSize:20}}>AI</span>
        <h2 style={{fontSize:18,fontWeight:700,color:"var(--t1)",margin:0}}>Meta Ads Coach</h2>
      </div>
      <p style={{fontSize:13,color:"var(--t3)",margin:"4px 0 0 30px"}}>Uses live Meta + Shopify data with Noody business context. Knows your benchmarks, history, and strategy.</p>
    </div>

    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
      {diagnosticPrompts.map((dp,i)=><button key={i} onClick={()=>ask(dp.prompt)} disabled={loading} style={{padding:"6px 14px",background:i>=3?"var(--accbg)":"var(--card2)",border:"1px solid "+(i>=3?"var(--acc)22":"var(--bdr)"),borderRadius:20,color:i>=3?"var(--acc2)":"var(--t3)",fontSize:12,cursor:loading?"wait":"pointer",transition:"all .2s",opacity:loading?0.5:1}}>{dp.label}</button>)}
    </div>

    {resp&&<div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,color:"var(--t3)"}}>Coach Response</span>
        <button onClick={()=>setResp("")} style={{padding:"4px 12px",background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--t3)",fontSize:11,cursor:"pointer"}}>Clear</button>
      </div>
      <div style={{padding:18,background:"var(--card2)",borderRadius:12,border:"1px solid var(--bdr)",whiteSpace:"pre-wrap",fontSize:14,color:"var(--t1)",lineHeight:1.7,maxHeight:500,overflowY:"auto"}}>{resp}</div>
    </div>}

    <div style={{display:"flex",gap:8}}>
      <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask()} placeholder="Ask anything about your Meta ads..." style={{flex:1,padding:"12px 16px",background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:10,color:"var(--t1)",fontSize:14}}/>
      <button onClick={()=>ask()} disabled={loading} style={{padding:"12px 24px",background:"var(--acc)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,cursor:loading?"wait":"pointer",fontSize:14,opacity:loading?0.6:1,whiteSpace:"nowrap"}}>{loading?"Thinking...":"Ask Coach"}</button>
    </div>
  </Card>;
}

// ---- Campaign Structure Calculator ----
function CampaignCalc({metaData}){
  const defaultSpend=metaData?.summary?.totalSpend?Math.round(metaData.summary.totalSpend/30):"500";
  const [dailySpend,setDailySpend]=useState(defaultSpend);
  const [countries,setCountries]=useState("1");
  const [genderSplit,setGenderSplit]=useState("no");

  const spend=parseFloat(dailySpend)||0;
  const bracket=BRACKETS.find(b=>spend<b.max)||BRACKETS[3];
  const numC=parseInt(countries)||1;
  const extraC=numC>1?numC-1:0;
  const totals={
    tof:bracket.tof+(spend>=500?extraC:0)+(genderSplit==="yes"?(spend<500?1:spend<1000?2:4):0),
    asc:bracket.asc+(spend>=500?extraC:extraC>1?extraC:0)+(genderSplit==="yes"?(spend<500?1:spend<1000?2:spend<3000?2:4):0),
    mof:bracket.mof+(spend>=3000?extraC:0)+(genderSplit==="yes"?(spend<3000?1:2):0),
  };
  const total=totals.tof+totals.asc+totals.mof;
  const spPer={tof:totals.tof?spend*FUNNEL.TOF/totals.tof:0,asc:totals.asc?spend*FUNNEL.ASC/totals.asc:0,mof:totals.mof?spend*FUNNEL.MOF/totals.mof:0};

  function Row({label,color,ratio,count,sp}){
    return <div style={{display:"grid",gridTemplateColumns:"80px 1fr 60px 80px 80px",gap:12,alignItems:"center",padding:"12px 16px",borderRadius:10,background:color+"08",borderLeft:"3px solid "+color}}>
      <span style={{fontWeight:700,fontSize:14,color}}>{label}</span>
      <div style={{height:8,borderRadius:4,background:color+"18",overflow:"hidden"}}><div style={{height:"100%",width:Math.min(ratio*200,100)+"%",background:color,borderRadius:4}}/></div>
      <span style={{fontFamily:"monospace",fontSize:14,color:"var(--t1)",textAlign:"center"}}>{(ratio*100).toFixed(0)}%</span>
      <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:"var(--t1)",textAlign:"center"}}>{count}</span>
      <span style={{fontFamily:"monospace",fontSize:13,color:"var(--t3)",textAlign:"right"}}>${sp.toFixed(0)}/ea</span>
    </div>;
  }

  return <Card>
    <div style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><span style={{fontSize:20}}>CALC</span><h2 style={{fontSize:18,fontWeight:700,color:"var(--t1)",margin:0}}>Campaign Structure Calculator</h2></div>
    <p style={{fontSize:13,color:"var(--t3)",margin:"4px 0 0 30px"}}>Optimal campaign count by spend, countries & gender targeting</p></div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:16,marginBottom:24}}>
      <Input label="Daily Spend" prefix="$" value={dailySpend} onChange={setDailySpend}/>
      <Input label="Countries" value={countries} onChange={setCountries} type="number" min="1" max="3"/>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        <label style={{fontSize:11,color:"var(--t3)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.04em"}}>Gender Split?</label>
        <div style={{display:"flex",gap:6}}><Pill active={genderSplit==="no"} onClick={()=>setGenderSplit("no")}>No</Pill><Pill active={genderSplit==="yes"} onClick={()=>setGenderSplit("yes")}>Yes</Pill></div>
      </div>
    </div>

    <div style={{background:"var(--card2)",borderRadius:12,padding:16,marginBottom:16}}>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr 60px 80px 80px",gap:12,marginBottom:8,padding:"0 16px"}}>

// ---- Traffic Light Benchmarking ----
function TrafficLight({metaData}){
  const initCampaigns=metaData?.data?.length>0?metaData.data.filter(function(c){return c.spend>5;}).map(function(c,i){return{id:i+1,name:c.campaign_name,cpa:c.cpp>0?c.cpp.toFixed(2):"",frequency:c.frequency>0?c.frequency.toFixed(2):"",spend:c.spend.toFixed(0),purchases:c.purchases,funnel:"TOF"};}):[{id:1,name:"",cpa:"",frequency:"",spend:"",purchases:"",funnel:"TOF"}];
  const [campaigns,setCampaigns]=useState(initCampaigns);
  const [greenCPA,setGreenCPA]=useState("25");
  const [yellowCPA,setYellowCPA]=useState("35");

  const addC=()=>setCampaigns(p=>[...p,{id:Date.now(),name:"",cpa:"",frequency:"",spend:"",purchases:"",funnel:"TOF"}]);
  const updC=(id,f,v)=>setCampaigns(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));
  const remC=(id)=>setCampaigns(p=>p.filter(c=>c.id!==id));

  const cpaStatus=(cpa)=>{const v=parseFloat(cpa);if(!v)return null;const g=parseFloat(greenCPA),y=parseFloat(yellowCPA);return v<=g?"green":v<=y?"yellow":"red";};
  const freqStatus=(f)=>{const v=parseFloat(f);if(!v)return null;return v<=1?"green":v<=2?"yellow":"red";};
  const getOpt=(c)=>{
    const cs=cpaStatus(c.cpa),fs=freqStatus(c.frequency);
    if(cs==="green"&&fs==="green")return{text:"Hero Ad - Scale spend 10-20%, test similar angles"};
    if(cs==="green"&&fs==="yellow")return{text:"Strong but watch frequency. Expand audience or refresh creative soon"};
    if(cs==="green"&&fs==="red")return{text:"Creative fatigue. Duplicate & refresh creative immediately"};
    if(cs==="yellow"&&fs==="green")return{text:"CPA trending up. Test new hooks, review creative angles"};
    if(cs==="yellow")return{text:"Needs attention. Test new creatives, review targeting"};
    if(cs==="red"&&fs==="red")return{text:"Kill this ad. Creative fatigued and CPA too high"};
    if(cs==="red")return{text:"CPA too high. Pause and replace with new creative"};
    return{text:"Enter metrics to get recommendation"};
  };

  return <Card>
    <div style={{marginBottom:20}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><span style={{fontSize:20}}>TL</span><h2 style={{fontSize:18,fontWeight:700,color:"var(--t1)",margin:0}}>Traffic Light Benchmarking</h2></div>
    <p style={{fontSize:13,color:"var(--t3)",margin:"4px 0 0 30px"}}>Auto-populated from live data. CPA thresholds from Noody benchmarks: Green &lt;$25, Yellow &lt;$35</p></div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:24}}>
      <div style={{padding:14,borderRadius:10,background:"var(--grnbg)",border:"1px solid var(--grn)22"}}><Input label="Green CPA (target)" prefix="$" value={greenCPA} onChange={setGreenCPA} small/></div>
      <div style={{padding:14,borderRadius:10,background:"var(--ylwbg)",border:"1px solid var(--ylw)22"}}><Input label="Yellow CPA (warning)" prefix="$" value={yellowCPA} onChange={setYellowCPA} small/></div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {campaigns.map(c=>{
        const cs=cpaStatus(c.cpa),fs=freqStatus(c.frequency),opt=getOpt(c);
        return <div key={c.id} style={{padding:16,borderRadius:12,background:"var(--card2)",border:"1px solid var(--bdr)",position:"relative"}}>
          {campaigns.length>1&&<button onClick={()=>remC(c.id)} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:16}}>x</button>}
          <div style={{display:"grid",gridTemplateColumns:"2fr repeat(3,1fr) 80px",gap:10,alignItems:"end",marginBottom:10}}>
            <Input label="Campaign" value={c.name} onChange={v=>updC(c.id,"name",v)} small/>
            <Input label="CPA" prefix="$" value={c.cpa} onChange={v=>updC(c.id,"cpa",v)} small/>
            <Input label="Frequency" value={c.frequency} onChange={v=>updC(c.id,"frequency",v)} small/>
            <Input label="Spend" prefix="$" value={c.spend} onChange={v=>updC(c.id,"spend",v)} small/>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.04em"}}>Funnel</label>
              <select value={c.funnel} onChange={e=>updC(c.id,"funnel",e.target.value)} style={{padding:"7px 8px",background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--t1)",fontSize:12}}>
                <option value="TOF">TOF</option><option value="ASC">ASC</option><option value="MOF">MOF</option>
              </select>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            {cs&&<Badge color={cs==="green"?"var(--grn)":cs==="yellow"?"var(--ylw)":"var(--red)"}>CPA: {cs}</Badge>}
            {fs&&<Badge color={fs==="green"?"var(--grn)":fs==="yellow"?"var(--ylw)":"var(--red)"}>Freq: {fs}</Badge>}
            <span style={{fontSize:12,color:"var(--t2)"}}>{opt.text}</span>
          </div>
        </div>;
      })}
    </div>
    <button onClick={addC} style={{marginTop:12,padding:"10px 20px",background:"transparent",border:"1px dashed var(--bdr)",borderRadius:10,color:"var(--t3)",cursor:"pointer",fontSize:13,width:"100%"}}>+ Add Campaign</button>
  </Card>;
}

// ---- Adset View ----
function AdsetView({adsetData,loading}){
  const [sort,setSort]=useState({key:"spend",dir:"desc"});

  const minS=parseFloat(minSpend)||0;
  const filtered=adsetData.data.filter(function(a){return a.spend>=minS;});

    </div>

    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            <th style={{padding:"10px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em",color:"var(--t3)",fontWeight:600,textAlign:"left",borderBottom:"1px solid var(--bdr)",minWidth:200}}>Campaign / Adset</th>
            <SortHeader label="Spend" sortKey="spend" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="Purch" sortKey="purchases" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="CPP" sortKey="cpp" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="ROAS" sortKey="roas" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="Freq" sortKey="frequency" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="CTR" sortKey="ctr" currentSort={sort} onSort={onSort} align="right"/>
          </tr>
        </thead>
        <tbody>
          {sorted.map(function(a,i){
            return <tr key={i} style={{borderBottom:"1px solid var(--bdr)"}}>
              <td style={{padding:"10px 12px"}}>
                <div style={{fontSize:11,color:"var(--t3)",marginBottom:2}}>{a.campaign_name}</div>
                <div style={{fontSize:13,color:"var(--t1)",fontWeight:500}}>{a.adset_name}</div>
              </td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"var(--t1)"}}>{f$(a.spend)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"var(--t1)"}}>{a.purchases}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:cppColor(a.cpp)}}>{a.cpp>0?f$(a.cpp):"--"}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:roasColor(a.roas)}}>{a.roas>0?a.roas.toFixed(2)+"x":"--"}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:freqColor(a.frequency)}}>{a.frequency>0?a.frequency.toFixed(2):"--"}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"var(--t2)"}}>{a.ctr>0?a.ctr.toFixed(2)+"%":"--"}</td>
            </tr>;
          })}
        </tbody>
      </table>

  </Card>;
}

function AdView({adData,loading}){

  const [view,setView]=useState("all");
  const onSort=(key)=>setSort(prev=>({key,dir:prev.key===key&&prev.dir==="desc"?"asc":"desc"}));

  if(loading)return <Card><div style={{textAlign:"center",padding:20,color:"var(--t3)"}}>Loading ad data...</div></Card>;
  if(!adData?.data?.length)return <Card><div style={{textAlign:"center",padding:20,color:"var(--t3)"}}>No ad data available</div></Card>;

  const minS=parseFloat(minSpend)||0;
  var filtered=adData.data.filter(function(a){return a.spend>=minS;});
  if(view==="heroes") filtered=filtered.filter(function(a){return a.purchases>0&&a.cpp>0&&a.cpp<=35&&a.roas>=2;});
  if(view==="underperformers") filtered=filtered.filter(function(a){return a.spend>=10&&(a.purchases===0||(a.cpp>35));});

  const sorted=[...filtered].sort(function(a,b){
    const av=a[sort.key]||0,bv=b[sort.key]||0;
    return sort.dir==="desc"?bv-av:av-bv;
  });

  const cppColor=function(v){return v<=0?"var(--t3)":v<=25?"var(--grn)":v<=35?"var(--ylw)":"var(--red)";};
  const roasColor=function(v){return v<=0?"var(--t3)":v>=3?"var(--grn)":v>=2?"var(--ylw)":"var(--red)";};
  const freqColor=function(v){return v<=0?"var(--t3)":v<=1.5?"var(--grn)":v<=2.5?"var(--ylw)":"var(--red)";};

  const heroCount=adData.data.filter(function(a){return a.purchases>0&&a.cpp>0&&a.cpp<=35&&a.roas>=2;}).length;
  const underCount=adData.data.filter(function(a){return a.spend>=10&&(a.purchases===0||(a.cpp>35));}).length;

  return <Card>
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>ADS</span>
          <h2 style={{fontSize:18,fontWeight:700,color:"var(--t1)",margin:0}}>Ad Performance</h2>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"var(--t3)"}}>Min spend:</span>
          <input value={minSpend} onChange={e=>setMinSpend(e.target.value)} style={{width:60,padding:"4px 8px",background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--t1)",fontSize:13,fontFamily:"monospace"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:8,margin:"8px 0 0 30px",flexWrap:"wrap"}}>
        <Pill active={view==="all"} onClick={()=>setView("all")}>All ({filtered.length})</Pill>
        <Pill active={view==="heroes"} onClick={()=>setView("heroes")}>Heroes ({heroCount})</Pill>
        <Pill active={view==="underperformers"} onClick={()=>setView("underperformers")}>Underperformers ({underCount})</Pill>
      </div>
    </div>

    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            <th style={{padding:"10px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em",color:"var(--t3)",fontWeight:600,textAlign:"left",borderBottom:"1px solid var(--bdr)",minWidth:200}}>Ad Name</th>
            <SortHeader label="Spend" sortKey="spend" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="Purch" sortKey="purchases" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="CPP" sortKey="cpp" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="ROAS" sortKey="roas" currentSort={sort} onSort={onSort} align="right"/>
            <SortHeader label="Freq" sortKey="frequency" currentSort={sort} onSort={onSort} align="right"/>

            <th style={{padding:"10px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em",color:"var(--t3)",fontWeight:600,textAlign:"center",borderBottom:"1px solid var(--bdr)"}}>Status</th>
          </tr>
        </thead>
        <tbody>

            return <tr key={i} style={{borderBottom:"1px solid var(--bdr)",background:isHero?"var(--grnbg)":isUnder?"var(--redbg)":"transparent"}}>

              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:freqColor(a.frequency)}}>{a.frequency>0?a.frequency.toFixed(2):"--"}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"var(--t2)"}}>{a.ctr>0?a.ctr.toFixed(2)+"%":"--"}</td>

                {isHero&&<Badge color="var(--grn)">Hero</Badge>}

              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>
  </Card>;
}

        <div style={{fontSize:20,fontWeight:700,color:m.c,fontFamily:"'JetBrains Mono',monospace"}}>{m.v}</div>

      <p style={{margin:0,fontSize:12,color:"var(--t2)",lineHeight:1.5}}>
        <strong style={{color:"var(--t1)"}}>Meta ROAS vs True MER:</strong> Meta claims {s.roas?s.roas.toFixed(2):"--"}x ROAS, but true DTC MER is {mer.toFixed(1)}%. {mer<=35?"MER is within target (<35%).":"MER exceeds 35% target \u2014 review campaign efficiency."} Meta typically over-reports by 20-30%.
      </p>
    </div>}
  </Card>;
}

// ---- Main App ----
function MetaCoach(){
  const [theme,setTheme]=useState("dark");
  const toggleTheme=()=>{const t=theme==="dark"?"light":"dark";setTheme(t);document.documentElement.setAttribute("data-theme",t);};
  const [tab,setTab]=useState("coach");
  const [days,setDays]=useState(30);
  const [metaData,setMetaData]=useState(null);
  const [adsetData,setAdsetData]=useState(null);
  const [adData,setAdData]=useState(null);
  const [shopifyData,setShopifyData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [adsetLoading,setAdsetLoading]=useState(false);
  const [adLoading,setAdLoading]=useState(false);
  const fetchedRef=useRef({});

  const fetchAll=useCallback(async(d)=>{
    setLoading(true);
    try{
      const [metaRes,shopRes]=await Promise.all([
        fetch("/api/pull-meta?days="+d+"&level=campaign",{headers:{"x-api-key":API_KEY}}),
        fetch("/api/pull-shopify?days="+d,{headers:{"x-api-key":API_KEY}}),
      ]);
      if(metaRes.ok){const md=await metaRes.json();setMetaData(md);}
      if(shopRes.ok){const sd=await shopRes.json();setShopifyData(sd);}
    }catch(e){console.error("Fetch error:",e);}
    setLoading(false);
    fetchedRef.current[d+"_campaign"]=true;
  },[]);

  const fetchAdsets=useCallback(async(d)=>{
    if(fetchedRef.current[d+"_adset"])return;
    setAdsetLoading(true);
    try{
      const r=await fetch("/api/pull-meta?days="+d+"&level=adset",{headers:{"x-api-key":API_KEY}});
      if(r.ok){const data=await r.json();setAdsetData(data);}
    }catch(e){console.error("Adset fetch:",e);}
    setAdsetLoading(false);
    fetchedRef.current[d+"_adset"]=true;
  },[]);

  const fetchAds=useCallback(async(d)=>{
    if(fetchedRef.current[d+"_ad"])return;
    setAdLoading(true);
    try{
      const r=await fetch("/api/pull-meta?days="+d+"&level=ad",{headers:{"x-api-key":API_KEY}});
      if(r.ok){const data=await r.json();setAdData(data);}
    }catch(e){console.error("Ad fetch:",e);}
    setAdLoading(false);
    fetchedRef.current[d+"_ad"]=true;
  },[]);

  useEffect(()=>{fetchAll(days);},[days]);

  useEffect(()=>{
    if(tab==="adsets")fetchAdsets(days);
    if(tab==="ads")fetchAds(days);
    if(tab==="coach"){fetchAdsets(days);fetchAds(days);}
  },[tab,days]);

  const changeDays=(d)=>{
    fetchedRef.current={};
    setAdsetData(null);
    setAdData(null);
    setDays(d);
  };

  const tabs=[
    {id:"coach",label:"AI Coach",icon:"AI"},
    {id:"adsets",label:"Adsets",icon:"AS"},
    {id:"ads",label:"Ads",icon:"AD"},
    {id:"structure",label:"Structure",icon:"CALC"},
    {id:"benchmark",label:"Benchmark",icon:"TL"},
    {id:"audiences",label:"Audiences",icon:"AUD"},
  ];

  return <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--t1)",fontFamily:"'DM Sans',-apple-system,sans-serif"}}>
    <div style={{padding:"20px 24px 14px",borderBottom:"1px solid var(--bdr)",background:"var(--card)"}}>
      <div style={{maxWidth:1100,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,var(--acc),var(--blu))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff"}}>EE</div>
          <div>
            <h1 style={{fontSize:20,fontWeight:800,margin:0,letterSpacing:"-0.02em",color:"var(--t1)"}}>Meta Ads Intelligence Coach</h1>
            <p style={{fontSize:12,color:"var(--t3)",margin:0}}>Ecommerce Equation Framework{metaData?" - Connected to Noody Hub":""}{shopifyData?" + Shopify":""}</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",gap:4}}>
            {[7,14,30,90].map(d=><button key={d} onClick={()=>changeDays(d)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(days===d?"var(--acc)":"var(--bdr)"),background:days===d?"var(--accbg)":"transparent",color:days===d?"var(--acc2)":"var(--t3)",fontSize:12,fontWeight:600,cursor:"pointer"}}>{d}d</button>)}
          </div>
          <a href="/" style={{padding:"8px 16px",background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:8,color:"var(--t2)",textDecoration:"none",fontSize:13,fontWeight:500}}>Dashboard</a>
          <button onClick={toggleTheme} style={{padding:"10px",background:"var(--card2)",border:"1px solid var(--bdr)",borderRadius:10,cursor:"pointer",fontSize:18,width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t2)"}}>{theme==="dark"?"Sun":"Moon"}</button>
        </div>
      </div>
    </div>

    <div style={{borderBottom:"1px solid var(--bdr)",background:"var(--card)",position:"sticky",top:0,zIndex:100,overflowX:"auto"}}>
      <div style={{maxWidth:1100,margin:"0 auto",display:"flex",gap:2,padding:"0 24px"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 20px",background:"transparent",border:"none",borderBottom:"2px solid "+(tab===t.id?"var(--acc)":"transparent"),color:tab===t.id?"var(--acc2)":"var(--t3)",fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,fontWeight:800,fontFamily:"monospace"}}>{t.icon}</span> {t.label}
        </button>)}
      </div>
    </div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:24,display:"flex",flexDirection:"column",gap:20}}>
      <LiveSummary metaData={metaData} shopifyData={shopifyData} loading={loading} days={days}/>
      {tab==="coach"&&<AICoach metaData={metaData} adsetData={adsetData} adData={adData} shopifyData={shopifyData} days={days}/>}
      {tab==="adsets"&&<AdsetView adsetData={adsetData} loading={adsetLoading}/>}
      {tab==="ads"&&<AdView adData={adData} loading={adLoading}/>}
      {tab==="structure"&&<CampaignCalc metaData={metaData}/>}
      {tab==="benchmark"&&<TrafficLight metaData={metaData}/>}
      {tab==="audiences"&&<AudienceSetup/>}
    </div>
  </div>;
}

function MetaCoachApp(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem(AUTH_KEY)==="1");
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  return <MetaCoach/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MetaCoachApp));
</script>
</body>
</html>
